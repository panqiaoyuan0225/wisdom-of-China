<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 四大名著经典学习网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background: linear-gradient(135deg, #f5f5dc 0%, #e8e4c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(139, 69, 19, 0.15);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #8b4513, #d4af37, #8b4513);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .logo h1 {
            color: #8b4513;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .logo p {
            color: #a0522d;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #5d4037;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            background: white;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #d4af37;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
            background: linear-gradient(135deg, #a0522d 0%, #8b4513 100%);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .guest-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7CB342 0%, #5C6BC0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(124, 179, 66, 0.3);
            margin-top: 15px;
        }

        .guest-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 179, 66, 0.4);
            background: linear-gradient(135deg, #5C6BC0 0%, #7CB342 100%);
        }

        .guest-btn:active {
            transform: translateY(0);
        }

        .guest-hint {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 10px;
            line-height: 1.5;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            background: linear-gradient(135deg, #a0522d 0%, #8b4513 100%);
        }

        .login-btn .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-link {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            margin-top: 30px;
        }

        .register-link a {
            color: #8b4513;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #d4af37;
            text-decoration: underline;
        }

        .decoration {
            position: absolute;
            opacity: 0.05;
            font-size: 8rem;
            pointer-events: none;
        }

        .decoration.top-right {
            top: -20px;
            right: -20px;
        }

        .decoration.bottom-left {
            bottom: -20px;
            left: -20px;
        }

        .error-message {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 25px;
            }

            .logo h1 {
                font-size: 1.5rem;
            }

            .remember-forgot {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <span class="decoration top-right">📖</span>
        <span class="decoration bottom-left">📚</span>
        
        <div class="logo">
            <div class="logo-icon">📜</div>
            <h1>四大名著经典学习网</h1>
            <p>品读经典，传承文化</p>
        </div>

        <div class="error-message" id="errorMessage">
            邮箱或密码错误，请重试
        </div>
        <div class="success-message" id="successMessage" style="background: #f1f8e9; border: 1px solid #c5e1a5; color: #33691e; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; display: none; text-align: center;">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>

        <button class="guest-btn" id="guestBtn" onclick="enterAsGuest()">👤 游客模式进入</button>
        <div class="guest-hint">游客仅可使用「名著阅读」和「原文阅读」功能</div>

        <div class="register-link">
            <a href="register.html">立即注册，开启你的古典文学之旅</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        if (!window.SUPABASE_CONFIG || !window.SUPABASE_CONFIG.url) {
            document.getElementById('errorMessage').textContent = '配置文件加载失败';
            document.getElementById('errorMessage').classList.add('show');
        }
        
        const SUPABASE_URL = window.SUPABASE_CONFIG.url;
        const SUPABASE_ANON_KEY = window.SUPABASE_CONFIG.anonKey;
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        console.log('Supabase 初始化:', SUPABASE_URL ? '成功' : '失败');

        function checkLoginStatus() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const rememberedUser = localStorage.getItem('rememberedUser');
            
            checkEmailConfirmation();
            
            if (isLoggedIn === 'true') {
                window.location.href = 'home.html';
                return;
            }

            if (rememberedUser) {
                document.getElementById('email').value = rememberedUser;
                document.getElementById('rememberMe').checked = true;
            }
        }

        async function checkEmailConfirmation() {
            const urlParams = new URLSearchParams(window.location.search);
            const successMessage = document.getElementById('successMessage');
            
            if (urlParams.get('confirmed') === 'true') {
                successMessage.textContent = '邮箱确认成功！请登录您的账号';
                successMessage.style.display = 'block';
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }

            const accessToken = urlParams.get('access_token');
            const refreshToken = urlParams.get('refresh_token');
            const type = urlParams.get('type');
            
            if (accessToken && type === 'signup') {
                try {
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    
                    if (!error) {
                        successMessage.textContent = '邮箱确认成功！请登录您的账号';
                        successMessage.style.display = 'block';
                    }
                } catch (e) {
                    console.log('会话设置:', e.message);
                }
                
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        const loginBtn = document.getElementById('loginBtn');
        let isLoggingIn = false;

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (isLoggingIn) {
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMessage = document.getElementById('errorMessage');

            isLoggingIn = true;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span>登录中...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    errorMessage.textContent = error.message || '邮箱或密码错误';
                    errorMessage.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    setTimeout(() => {
                        errorMessage.classList.remove('show');
                    }, 3000);
                    return;
                }

                if (data.user) {
                    const username = data.user.user_metadata?.username || email.split('@')[0];
                    
                    // 清理本地数据，防止账号间混淆
                    if (window.DataManager && typeof window.DataManager.clearLocalData === 'function') {
                        window.DataManager.clearLocalData();
                    }

                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('currentUser', username);
                    sessionStorage.setItem('userEmail', data.user.email);
                    sessionStorage.setItem('userId', data.user.id);

                    if (rememberMe) {
                        localStorage.setItem('rememberedUser', email);
                    } else {
                        localStorage.removeItem('rememberedUser');
                    }

                    await syncUserProfile(data.user.id, username, email);
                    
                    // 强制覆盖模式拉取云端数据
                    await loadUserDataFromCloud(data.user.id, username, true);

                    window.location.href = 'home.html';
                }
            } catch (error) {
                console.error('登录错误:', error);
                errorMessage.textContent = '错误：' + (error.message || '网络错误');
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 5000);
            } finally {
                isLoggingIn = false;
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });

        async function syncUserProfile(userId, username, email) {
            try {
                const { data: existingUser } = await supabaseClient
                    .from('users')
                    .select('id')
                    .eq('user_id', userId)
                    .single();
                
                if (!existingUser) {
                    await supabaseClient
                        .from('users')
                        .insert([{
                            user_id: userId,
                            email: email,
                            username: username
                        }]);
                }
            } catch (e) {
                console.log('同步用户资料:', e.message);
            }
        }

        async function loadUserDataFromCloud(userId, username, force = false) {
            try {
                const success = await window.DataManager.loadFromCloud(force);
                if (success) {
                    console.log('云端数据加载成功');
                }
            } catch (e) {
                console.log('加载云端数据:', e.message);
            }
        }

        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });

        function enterAsGuest() {
            sessionStorage.setItem('isGuest', 'true');
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('currentUser', '游客');
            window.location.href = 'home.html';
        }

        checkLoginStatus();
    </script>
</body>
</html>
