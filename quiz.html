<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题练习</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 40px;
            overflow-y: auto;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 40px;
            text-decoration: none;
            color: #f5f5dc;
            font-weight: bold;
            background: #8b4513;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .page-title {
            color: #8b4513;
            font-size: 2.5rem;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .settings-card {
            width: 100%;
            max-width: 800px;
        }

        .setting-section {
            margin-bottom: 25px;
        }

        .setting-section:last-of-type {
            margin-bottom: 30px;
        }

        .section-label {
            color: #8b4513;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .option-btn {
            flex: 1;
            min-width: 140px;
            padding: 5px 30px;
            border: 3px solid #333;
            border-radius: 15px;
            background: #fff;
            color: #8b4513;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .option-btn.selected {
            border-color: #d4af37;
            background: linear-gradient(135deg, #fff9e6, #fff5d6);
            color: #8b4513;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .mode-btn .emoji {
            font-size: 2.5rem;
        }

        .helper-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .helper-btn .emoji {
            font-size: 2rem;
        }

        .slider-container {
            width: 100%;
            padding: 20px 0;
            user-select: none;
        }

        .slider-track {
            position: relative;
            width: 100%;
            height: 40px;
        }

        .slider-axis {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: #d4af37;
            border-radius: 2px;
            transform: translateY(-50%);
        }

        .slider-ticks {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .slider-tick {
            position: relative;
            width: 3px;
            height: 20px;
            background: #d4af37;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 1px;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 28px;
            height: 28px;
            background: #d4af37;
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            border: 3px solid #fff;
            transform: translate(-50%, -50%);
            transition: transform 0.1s, box-shadow 0.2s;
            z-index: 10;
        }

        .slider-thumb:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .slider-thumb:active {
            cursor: grabbing;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .slider-labels span {
            width: 30px;
            text-align: center;
            color: #8b4513;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .start-btn {
            width: 100%;
            padding: 22px 50px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f5dc;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(139, 69, 19, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .quiz-container {
            display: none;
            width: 100%;
            max-width: 800px;
        }

        .quiz-container.active {
            display: block;
        }

        .settings-card.hidden {
            display: none;
        }

        .history-stats {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .history-stat-item {
            text-align: center;
            color: #f5f5dc;
        }

        .history-stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
        }

        .history-stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .history-stat-divider {
            width: 1px;
            height: 40px;
            background: rgba(245, 245, 220, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #d4af37;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #8b4513;
        }

        .question-number {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .question-mode {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .question-text {
            font-size: 1.3rem;
            color: #333;
            line-height: 1.8;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            border-left: 4px solid #d4af37;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option-item {
            padding: 15px 20px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .option-item:hover {
            border-color: #d4af37;
            transform: translateX(5px);
        }

        .option-item.selected {
            border-color: #d4af37;
            background: linear-gradient(135deg, #fff9e6, #fff5d6);
        }

        .option-item.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        .option-item.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .option-item.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .analysis-box {
            display: none;
            padding: 20px;
            background: rgba(255,255,255,0.7);
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #8b4513;
        }

        .analysis-box.show {
            display: block;
        }

        .analysis-title {
            font-weight: bold;
            color: #8b4513;
            margin-bottom: 10px;
        }

        .analysis-text {
            color: #555;
            line-height: 1.6;
        }

        /* 道具栏样式 */
        .items-bar {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #FFD700;
        }

        .items-bar-title {
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .items-bar-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .item-slot {
            background: linear-gradient(135deg, #f5f5dc, #e8e4c9);
            border: 2px solid #d4af37;
            border-radius: 10px;
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
        }

        .item-slot:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        .item-slot.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .item-slot .icon {
            font-size: 1.3rem;
        }

        .item-slot .name {
            font-size: 0.85rem;
            color: #8B4513;
        }

        .item-slot .count {
            background: #8B4513;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .item-slot.empty {
            border: 2px dashed #ccc;
            background: transparent;
            cursor: default;
        }

        .item-slot.empty:hover {
            transform: none;
            box-shadow: none;
        }

        .quiz-actions {
            display: flex;
            gap: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .next-btn {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f5dc;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .prev-btn {
            background: linear-gradient(135deg, #666, #888);
            color: #f5f5dc;
        }

        .prev-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .prev-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .skip-btn {
            background: linear-gradient(135deg, #d4af37, #c9a227);
            color: #fff;
        }

        .skip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .skipped-count {
            color: #d4af37;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .result-container {
            display: none;
            width: 100%;
            max-width: 800px;
            text-align: center;
            min-height: 100vh;
            margin-top: -60px;
        }

        .result-container.active {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .result-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .result-emoji {
            font-size: 4rem;
        }

        .result-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-score {
            font-size: 4rem;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 1.5rem;
            color: #8b4513;
            margin-bottom: 30px;
        }

        .result-buttons {
            display: flex;
            gap: 15px;
        }

        .result-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f5dc;
            margin: 10px;
        }

        .result-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
        }

        .no-questions {
            text-align: center;
            padding: 50px;
            color: #8b4513;
        }

        .no-questions h2 {
            margin-bottom: 20px;
        }

        .fill-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .fill-input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .fill-input.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        .fill-input.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .submit-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f5dc;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .brief-textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.6;
        }

        .brief-textarea:focus {
            outline: none;
            border-color: #d4af37;
        }

        .answer-reveal {
            margin-top: 15px;
            padding: 15px;
            background: #f0fdf4;
            border-left: 4px solid #16a34a;
            border-radius: 0 8px 8px 0;
        }

        .answer-reveal .label {
            font-weight: bold;
            color: #16a34a;
            margin-bottom: 8px;
        }

        .question-type-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #d4af37;
            color: #fff;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .question-history-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-left: 8px;
            font-weight: normal;
        }

        .question-history-tag.new {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .question-history-tag.done {
            background: #fff3e0;
            color: #e65100;
        }

        /* 错题本样式 */
        .wrong-book-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .wrong-book-modal.active {
            display: flex;
        }

        .wrong-book-content {
            background: #f5f5dc;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .wrong-book-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f5dc;
        }

        .wrong-book-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .wrong-book-close {
            background: none;
            border: none;
            color: #f5f5dc;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .wrong-book-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .wrong-book-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: rgba(139, 69, 19, 0.1);
            border-bottom: 1px solid rgba(139, 69, 19, 0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #8b4513;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .wrong-book-filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(139, 69, 19, 0.1);
        }

        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #8b4513;
            background: transparent;
            color: #8b4513;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: rgba(139, 69, 19, 0.1);
        }

        .filter-btn.active {
            background: #8b4513;
            color: #f5f5dc;
        }

        .wrong-book-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .wrong-item {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #f44336;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .wrong-item.skipped {
            border-left-color: #ff9800;
        }

        .wrong-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .wrong-item-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .wrong-item-type.wrong {
            background: #ffebee;
            color: #f44336;
        }

        .wrong-item-type.skipped {
            background: #fff3e0;
            color: #ff9800;
        }

        .wrong-item-mode {
            font-size: 0.8rem;
            color: #888;
        }

        .wrong-item-question {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .wrong-item-answer {
            font-size: 0.95rem;
            color: #16a34a;
            padding: 10px;
            background: #f0fdf4;
            border-radius: 8px;
        }

        .wrong-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #888;
        }

        .wrong-item-delete {
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .wrong-item-delete:hover {
            background: #ffebee;
        }

        .wrong-book-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            border-top: 1px solid rgba(139, 69, 19, 0.1);
        }

        .wrong-book-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wrong-book-btn.primary {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f5dc;
        }

        .wrong-book-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
        }

        .wrong-book-btn.primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .wrong-book-btn.danger {
            background: #fff;
            color: #f44336;
            border: 2px solid #f44336;
        }

        .wrong-book-btn.danger:hover {
            background: #ffebee;
        }

        .wrong-book-empty {
            text-align: center;
            padding: 60px 20px;
            color: #8b4513;
        }

        .wrong-book-empty .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .wrong-book-empty p {
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            .settings-card {
                padding: 35px 25px;
            }

            .btn-group {
                gap: 15px;
            }

            .option-btn {
                padding: 15px 20px;
                font-size: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .wrong-book-stats {
                gap: 15px;
            }

            .stat-number {
                font-size: 1.5rem;
            }

            .wrong-book-actions {
                flex-direction: column;
            }

            .wrong-book-btn {
                width: 100%;
            }
        }
    </style>
    <script src="supabase-config.js"></script>
    <script src="guest-access-check.js"></script>
</head>
<body>
    <a href="home.html" class="back-link">← 返回主页</a>
    
    <h1 class="page-title">答题练习</h1>
    
    <div class="settings-card">
        <div class="history-stats">
            <div class="history-stat-item">
                <span class="history-stat-number" id="historyCompleted">0</span>
                <span class="history-stat-label">已完成</span>
            </div>
            <div class="history-stat-divider"></div>
            <div class="history-stat-item">

            { type: '填空', q: '三国中，最后一位称帝的君主是吴国的_________。', a: '孙皓', note: '孙皓也是吴国的亡国之君，其统治后期非常残暴。' },

            { type: '填空', q: '三国时期，魏国的地盘主要位于_________流域。', a: '黄河', note: '黄河流域在当时依然是中国的政治与经济中心。' },
            { type: '填空', q: '"士别三日，即更刮目相待"是说孙吴名将_________勤奋好学。', a: '吕蒙', note: '吕蒙从一介武夫成长为深谋远虑的统帅，奇袭荆州即出自其手。' },
            { type: '简答', q: '简述荆州在三国地理博弈中为何被称为"被诅咒的十字路口"？', a: '战略地位极其重要，但地势平坦，无险可守。荆州是连接魏、蜀、吴三方的枢纽。对于占据者来说，它虽然是向四周扩张的跳板，但由于缺乏天然屏障且三方利益冲突无法调和，导致占据者必须随时面对多线作战的巨大压力。', note: '荆州是连接魏、蜀、吴三方的枢纽。对于占据者来说，它虽然是向四周扩张的跳板，但由于缺乏天然屏障且三方利益冲突无法调和，导致占据者必须随时面对多线作战的巨大压力。' },
            { type: '简答', q: '曹操之所以能从汉末群雄中脱颖而出，其"屯田制"起到了什么作用？', a: '解决了粮食补给问题，并实现了人口的社会管理。屯田制通过将流民与土地结合，不仅保证了军队的军粮供给，还使曹操在战乱中获得了稳定的税收和兵源，从而在持久战中耗赢了其他军阀。', note: '屯田制通过将流民与土地结合，不仅保证了军队的军粮供给，还使曹操在战乱中获得了稳定的税收和兵源，从而在持久战中耗赢了其他军阀。' },
            { type: '简答', q: '为什么《隆中对》中强调"跨有荆益"是北伐成功的前提？', a: '目的是形成两路并举的钳形攻势。如果只从益州出兵，会受阻于秦岭山道；若同时从荆州出兵宛洛，魏国必须分兵防御，蜀汉才能打破地理限制，使魏国首尾不能相顾。', note: '如果只从益州出兵，会受阻于秦岭山道；若同时从荆州出兵宛洛，魏国必须分兵防御，蜀汉才能打破地理限制，使魏国首尾不能相顾。' },
            { type: '简答', q: '分析赤壁之战中孙刘联军获胜的地理环境因素。', a: '利用了水网地形、气候（东南风）和北方士兵的生理局限。南方湿润多水阻断了北方骑兵的机动性；曹军不习水性导致连环锁船；周瑜敏锐捕捉到冬至前后的气象变化，利用火攻扩大了战果。', note: '南方湿润多水阻断了北方骑兵的机动性；曹军不习水性导致连环锁船；周瑜敏锐捕捉到冬至前后的气象变化，利用火攻扩大了战果。' },
            { type: '简答', q: '从长远来看，为什么曹魏统一全国是历史的必然？', a: '综合国力（人口、资源、正统地位）的绝对压制。曹魏占据了当时全国超过65%的人口和农耕产区。在长期的对峙中，魏国的容错率远高于蜀吴。随着时间的推移，这种巨大的资源差距最终演变为无法逾越的军事压制。', note: '曹魏占据了当时全国超过65%的人口和农耕产区。在长期的对峙中，魏国的容错率远高于蜀吴。随着时间的推移，这种巨大的资源差距最终演变为无法逾越的军事压制。' },

            // 简答题
            { type: '简答', q: '简述"三打白骨精"的故事情节，并分析唐僧为什么要赶走孙悟空。', a: '情节：白骨精先后变成村姑、老妇、老翁三次欺骗唐僧，都被孙悟空识破并打死。唐僧肉眼凡胎看不出妖魔，误认为孙悟空滥杀无辜，加上猪八戒挑唆，唐僧念紧箍咒并写下贬书，将孙悟空赶回花果山。原因：唐僧慈悲为怀，不辨真假；猪八戒挑拨离间；孙悟空行事鲁莽，没有解释清楚。', note: '情节：白骨精先后变成村姑、老妇、老翁三次欺骗唐僧，都被孙悟空识破并打死。唐僧肉眼凡胎看不出妖魔，误认为孙悟空滥杀无辜，加上猪八戒挑唆，唐僧念紧箍咒并写下贬书，将孙悟空赶回花果山。原因：唐僧慈悲为怀，不辨真假；猪八戒挑拨离间；孙悟空行事鲁莽，没有解释清楚。' },
            { type: '简答', q: '分析孙悟空的形象特点及其成长历程。', a: '形象特点：勇敢无畏、嫉恶如仇、聪明机智、重情重义、桀骜不驯。成长历程：从石猴到美猴王（称王）；从美猴王到弼马温、齐天大圣（反叛）；从齐天大圣到五行山下被压（受罚）；从五行山下到取经路上（修行）；从取经路上到斗战胜佛（成佛）。孙悟空的成长是从反叛者到修行者的转变，体现了修行的主题。', note: '形象特点：勇敢无畏、嫉恶如仇、聪明机智、重情重义、桀骜不驯。成长历程：从石猴到美猴王（称王）；从美猴王到弼马温、齐天大圣（反叛）；从齐天大圣到五行山下被压（受罚）；从五行山下到取经路上（修行）；从取经路上到斗战胜佛（成佛）。孙悟空的成长是从反叛者到修行者的转变，体现了修行的主题。' },
            { type: '简答', q: '分析取经团队中四个角色的象征意义。', a: '唐僧：代表信念和目标，是团队的核心和灵魂，象征修行者的"心"。孙悟空：代表能力和行动，是降妖除魔的主力，象征"心猿"，需要约束。猪八戒：代表欲望和惰性，贪吃好色、懒惰散漫，象征修行路上的障碍。沙悟净：代表踏实和忠诚，任劳任怨、默默奉献，象征修行者的坚持。四人组合象征修行者内心的不同层面：信念、能力、欲望、坚持。', note: '唐僧：代表信念和目标，是团队的核心和灵魂，象征修行者的"心"。孙悟空：代表能力和行动，是降妖除魔的主力，象征"心猿"，需要约束。猪八戒：代表欲望和惰性，贪吃好色、懒惰散漫，象征修行路上的障碍。沙悟净：代表踏实和忠诚，任劳任怨、默默奉献，象征修行者的坚持。四人组合象征修行者内心的不同层面：信念、能力、欲望、坚持。' },
            { type: '简答', q: '分析"九九八十一难"的象征意义。', a: '八十一难象征修行路上的种种考验和磨难。从内容看：妖魔之难代表外在障碍；自然之难代表环境考验；人心之难代表世俗诱惑；师徒之难代表内部矛盾。从结构看：八十一难是"九九归真"的体现，九是阳数之极，九九八十一代表圆满。从主题看：每一难都是一次修行，每一次战胜都是一次成长，磨难是通往觉悟的必经之路。', note: '八十一难象征修行路上的种种考验和磨难。从内容看：妖魔之难代表外在障碍；自然之难代表环境考验；人心之难代表世俗诱惑；师徒之难代表内部矛盾。从结构看：八十一难是"九九归真"的体现，九是阳数之极，九九八十一代表圆满。从主题看：每一难都是一次修行，每一次战胜都是一次成长，磨难是通往觉悟的必经之路。' },
            { type: '简答', q: '分析《西游记》的主题思想及其现实意义。', a: '主题思想：1.修行主题：取经之路即修行之路，磨难是修行的必经过程。2.成长主题：从反叛到觉悟，从凡人到成佛的成长历程。3.团队主题：信念、能力、坚持、克服欲望缺一不可。4.反抗主题：孙悟空大闹天宫体现了反抗精神。现实意义：1.面对困难要坚持不懈，磨难是成长的机会。2.团队合作需要相互信任、包容。3.要有坚定的信念和目标。4.要克服内心的欲望和惰性。5.真正的修行在于实践，不在于形式。', note: '主题思想：1.修行主题：取经之路即修行之路，磨难是修行的必经过程。2.成长主题：从反叛到觉悟，从凡人到成佛的成长历程。3.团队主题：信念、能力、坚持、克服欲望缺一不可。4.反抗主题：孙悟空大闹天宫体现了反抗精神。现实意义：1.面对困难要坚持不懈，磨难是成长的机会。2.团队合作需要相互信任、包容。3.要有坚定的信念和目标。4.要克服内心的欲望和惰性。5.真正的修行在于实践，不在于形式。' },

            STORAGE_KEY: 'user_points_v1',
            
            getData() {
                try {
                    const data = localStorage.getItem(this.STORAGE_KEY);
                    return data ? JSON.parse(data) : {
                        totalPoints: 0,
                        todayPoints: 0,
                        lastDate: '',
                        pointsHistory: [],
                        streak: 0  // 连击次数
                    };
                } catch (e) {
                    return {
                        totalPoints: 0,
                        todayPoints: 0,
                        lastDate: '',
                        pointsHistory: [],
                        streak: 0
                    };
                }

            saveData(data) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));

                if (window.DataManager && typeof window.DataManager.syncToCloud === 'function') {
                    window.DataManager.syncToCloud();
                }

            addPoints(points, reason) {
                const data = this.getData();
                const today = new Date().toDateString();
                
                if (data.lastDate !== today) {
                    data.todayPoints = 0;
                    data.lastDate = today;
                }
                
                data.totalPoints += points;
                data.todayPoints += points;
                data.pointsHistory.unshift({
                    points: points,
                    reason: reason,
                    time: Date.now()
                });
                
                // 只保留最近100条记录
                if (data.pointsHistory.length > 100) {
                    data.pointsHistory = data.pointsHistory.slice(0, 100);
                }
                
                this.saveData(data);
                this.showPointsNotification(points, reason);
                return data.totalPoints;
            },
            
            getTotalPoints() {

            getStreak() {

            STORAGE_KEY: 'quiz_wrong_book_v1',
            
            getAll() {

                    return data ? JSON.parse(data) : [];

                    console.error('读取错题本失败:', e);

                } catch (e) {
                    console.error('保存错题本失败:', e);
                }
            },
            
            generateId(question) {
                let str = question.q;
                if (question.options) {
                    str += question.options.join('');
                }
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(36);
            },
            
            add(question, mode, type, userAnswer) {
                const data = this.getAll();
                const id = this.generateId(question);
                const existingIndex = data.findIndex(item => item.id === id);
                
                if (existingIndex >= 0) {
                    data[existingIndex].count = (data[existingIndex].count || 1) + 1;
                    data[existingIndex].timestamp = Date.now();
                    data[existingIndex].userAnswer = userAnswer;
                    if (type === 'wrong') {
                        data[existingIndex].type = 'wrong';
                    }
                } else {
                    data.push({
                        id: id,
                        question: question,
                        mode: mode,
                        type: type,
                        userAnswer: userAnswer,
                        timestamp: Date.now(),
                        count: 1
                    });
                }
                
                this.save(data);
                return id;
            },
            
            remove(id) {
                const data = this.getAll();

            updateCategoryMastery(question, isCorrect) {
                const category = this.getQuestionCategory(question);
                if (!category) return;
                
                const MASTERY_KEY = 'category_mastery_v1';
                const CATEGORY_STATS_KEY = 'category_stats_v1';
                
                try {
                    let stats = {};
                    const statsData = localStorage.getItem(CATEGORY_STATS_KEY);
                    if (statsData) {
                        stats = JSON.parse(statsData);
                    }
                    
                    if (!stats[category]) {
                        stats[category] = { total: 0, correct: 0 };
                    }
                    
                    stats[category].total++;
                    if (isCorrect) {
                        stats[category].correct++;
                    }
                    
                    safeSaveData(CATEGORY_STATS_KEY, stats);
                    
                    const mastery = stats[category].total > 0 
                        ? stats[category].correct / stats[category].total 
                        : 0;
                    
                    let masteryData = {};
                    const masterySaved = localStorage.getItem(MASTERY_KEY);
                    if (masterySaved) {
                        masteryData = JSON.parse(masterySaved);
                    }
                    masteryData[category] = mastery;
                    safeSaveData(MASTERY_KEY, masteryData);
                } catch (e) {
                    console.error('更新分类掌握度失败:', e);
                }
            },
            
            syncToCloud() {
                safeSyncToCloud();
            },
            
            syncQuizDataToCloud() {
                safeSyncToCloud();

                return await safeLoadFromCloud();

            getHistory(question) {
                const data = this.getAll();
                const id = this.generateId(question);
                return data[id] || null;
            },
            
            getStats(allQuestions) {
                const data = this.getAll();
                let completed = 0;
                let totalAttempts = 0;
                let totalCorrect = 0;
                
                allQuestions.forEach(q => {
                    const id = this.generateId(q);
                    if (data[id]) {
                        completed++;
                        totalAttempts += data[id].totalAttempts;
                        totalCorrect += data[id].correctCount;
                    }
                });
                
                return {
                    completed,
                    total: allQuestions.length,
                    totalAttempts,
                    totalCorrect,
                    accuracy: totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0
                };
            },
            
            clear() {
                this.save({});
            }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz() {
            const allQuestions = settings.mode === 'review' ? reviewQuestions : extendQuestions;
            
            if (allQuestions.length === 0) {
                const modeName = settings.mode === 'review' ? '复习模式' : '拓展模式';
                alert(`${modeName}题库暂无题目，敬请期待！`);
                return;
            }
            
            isWrongBookMode = false;
            
            if (smartQuiz) {
                const wrongBookQuestions = WrongBookManager.getAll().map(item => item.question);
                const wrongIds = new Set(wrongBookQuestions.map(q => QuestionHistoryManager.generateId(q)));
                
                const newQuestions = [];
                const weakQuestions = [];
                const otherQuestions = [];
                
                allQuestions.forEach(q => {
                    const id = QuestionHistoryManager.generateId(q);
                    if (wrongIds.has(id)) {
                        return;
                    }
                    
                    const history = QuestionHistoryManager.getHistory(q);
                    if (!history) {
                        newQuestions.push(q);
                    } else {
                        const accuracy = history.correctCount / history.totalAttempts;
                        if (accuracy < 0.7) {
                            weakQuestions.push({ q, accuracy });
                        } else {
                            otherQuestions.push(q);
                        }
                    }
                });
                
                weakQuestions.sort((a, b) => a.accuracy - b.accuracy);
                
                const prioritized = [
                    ...shuffleArray(wrongBookQuestions),
                    ...shuffleArray(newQuestions),
                    ...weakQuestions.map(item => item.q),
                    ...shuffleArray(otherQuestions)
                ];
                
                currentQuestions = prioritized.slice(0, Math.min(settings.count, prioritized.length));
            } else {
                currentQuestions = shuffleArray(allQuestions).slice(0, Math.min(settings.count, allQuestions.length));
            }
            
            currentIndex = 0;
            score = 0;
            answered = false;
            skippedIndices = new Set();
            questionStates = {};
            
            document.querySelector('.settings-card').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('active');
            document.getElementById('quizContainer').classList.add('active');
            
            showQuestion();
        }

        function getTypeName(type) {
            switch(type) {
                case '选择': return '选择题';
                case '填空': return '填空题';
                case '简答': return '简答题';
                default: return type;
            }
        }

        function showQuestion() {
            const question = currentQuestions[currentIndex];
            const state = questionStates[currentIndex];
            
            let skippedText = '';
            if (skippedIndices.size > 0) {
                skippedText = `<span class="skipped-count">（已跳过 ${skippedIndices.size} 题）</span>`;
            }
            
            let historyTag = '';
            const history = QuestionHistoryManager.getHistory(question);
            if (history) {
                const accuracy = Math.round((history.correctCount / history.totalAttempts) * 100);
                historyTag = `<span class="question-history-tag done">已做${history.totalAttempts}次 ${accuracy}%</span>`;
            } else {
                historyTag = `<span class="question-history-tag new">新</span>`;
            }
            
            document.getElementById('questionNumber').innerHTML = `第 ${currentIndex + 1} 题 / 共 ${currentQuestions.length} 题 ${skippedText}<span class="question-type-tag">${getTypeName(question.type)}</span>${historyTag}`;
            document.getElementById('questionMode').textContent = isWrongBookMode ? '错题复习' : (settings.mode === 'review' ? '复习模式' : '拓展模式');
            document.getElementById('questionText').textContent = question.q;
            
            const progress = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = '';
            
            if (question.type === '选择') {
                const labels = ['A', 'B', 'C', 'D'];
                const correctIndex = question.a.charCodeAt(0) - 65;
                question.options.forEach((option, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option-item';
                    optionDiv.textContent = `${labels[index]}. ${option}`;
                    
                    if (state && state.answered) {
                        optionDiv.classList.add('disabled');
                        if (index === correctIndex) {
                            optionDiv.classList.add('correct');
                        }
                        if (index === state.selectedIndex && index !== correctIndex) {
                            optionDiv.classList.add('wrong');
                        }
                    } else {
                        optionDiv.onclick = () => selectOption(index, optionDiv);
                    }
                    
                    optionsList.appendChild(optionDiv);
                });
            } else if (question.type === '填空') {
                optionsList.innerHTML = `
                    <input type="text" class="fill-input" id="fillInput" placeholder="请输入答案...">
                    <button class="submit-btn" onclick="submitFill()">提交答案</button>
                `;
                
                if (state && state.answered) {
                    const input = document.getElementById('fillInput');
                    input.value = state.userAnswer || '';
                    input.disabled = true;
                    if (state.isCorrect) {
                        input.classList.add('correct');
                    } else {
                        input.classList.add('wrong');
                    }
                    document.querySelector('.submit-btn').disabled = true;
                    
                    const answerReveal = document.createElement('div');
                    answerReveal.className = 'answer-reveal';
                    answerReveal.innerHTML = `
                        <div class="label">正确答案：${question.a}</div>
                    `;
                    optionsList.appendChild(answerReveal);
                }
            } else if (question.type === '简答') {
                optionsList.innerHTML = `
                    <textarea class="brief-textarea" id="briefInput" placeholder="请输入你的答案..."></textarea>
                    <button class="submit-btn" onclick="submitBrief()">完成作答</button>
                `;
                
                if (state && state.answered) {
                    const textarea = document.getElementById('briefInput');
                    textarea.value = state.userAnswer || '';
                    textarea.disabled = true;
                    document.querySelector('.submit-btn').disabled = true;
                    
                    const answerReveal = document.createElement('div');
                    answerReveal.className = 'answer-reveal';
                    answerReveal.innerHTML = `
                        <div class="label">参考答案：</div>
                        <div>${question.a}</div>
                    `;
                    optionsList.appendChild(answerReveal);
                }
            }
            
            if (state && state.answered) {
                if (autoShowAnalysis) {
                    document.getElementById('analysisText').textContent = question.note || '暂无解析';
                    document.getElementById('analysisBox').classList.add('show');
                }
                answered = true;
            } else {
                document.getElementById('analysisBox').classList.remove('show');
                answered = false;
            }
            
            updateButtons();
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentIndex === 0;
            
            if (currentIndex === currentQuestions.length - 1) {
                nextBtn.textContent = '查看结果';
            } else {
                nextBtn.textContent = '下一题';
            }
            
            nextBtn.disabled = !answered;
        }

        function selectOption(index, element) {
            if (answered) return;
            answered = true;
            
            const question = currentQuestions[currentIndex];
            const options = document.querySelectorAll('.option-item');
            const correctIndex = question.a.charCodeAt(0) - 65;
            const isCorrect = index === correctIndex;
            const labels = ['A', 'B', 'C', 'D'];
            
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === correctIndex) {
                    opt.classList.add('correct');
                }
            });
            
            if (!isCorrect) {
                element.classList.add('wrong');
                if (!isWrongBookMode) {
                    WrongBookManager.add(question, settings.mode, 'wrong', labels[index]);
                }
                // 答错也得少量积分
                PointsManager.addPoints(2, '答题参与');
                PointsManager.resetStreak();
            } else {
                score++;
                WrongBookManager.removeByQuestion(question);
                
                // 计算积分
                let points = 10;  // 基础积分
                const streak = PointsManager.incrementStreak();
                
                // 连击奖励
                if (streak >= 20) {
                    points += 300;
                } else if (streak >= 10) {
                    points += 120;
                } else if (streak >= 5) {
                    points += 50;
                }
                
                // 检查双倍积分
                if (ItemEffects.isDoubleActive()) {
                    points *= 2;
                    PointsManager.addPoints(points, `双倍积分！答对题目`);
                } else {
                    let reason = '答对题目';
                    if (streak >= 20) reason = `完美连击！连续答对${streak}题`;
                    else if (streak >= 10) reason = `超级连击！连续答对${streak}题`;
                    else if (streak >= 5) reason = `连击奖励！连续答对${streak}题`;
                    PointsManager.addPoints(points, reason);
                }
            }
            
            if (!isWrongBookMode) {
                QuestionHistoryManager.recordAttempt(question, isCorrect);
                QuestionHistoryManager.syncToCloud();
            }
            
            questionStates[currentIndex] = {
                answered: true,
                selectedIndex: index,
                isCorrect: isCorrect
            };
            
            skippedIndices.delete(currentIndex);
            
            if (autoShowAnalysis) {
                document.getElementById('analysisText').textContent = question.note || '暂无解析';
                document.getElementById('analysisBox').classList.add('show');
            }
            
            updateButtons();
            updateSkippedCount();
        }

        function submitFill() {
            if (answered) return;
            answered = true;
            
            const question = currentQuestions[currentIndex];
            const input = document.getElementById('fillInput');
            const userAnswer = input.value.trim();
            const correctAnswer = question.a;
            
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                score++;
                input.classList.add('correct');
                WrongBookManager.removeByQuestion(question);
                
                // 计算积分
                let points = 10;
                const streak = PointsManager.incrementStreak();
                
                if (streak >= 20) {
                    points += 300;
                    PointsManager.addPoints(points, `完美连击！连续答对${streak}题`);
                } else if (streak >= 10) {
                    points += 120;
                    PointsManager.addPoints(points, `超级连击！连续答对${streak}题`);
                } else if (streak >= 5) {
                    points += 50;
                    PointsManager.addPoints(points, `连击奖励！连续答对${streak}题`);
                } else {
                    PointsManager.addPoints(points, '答对题目');
                }
            } else {
                input.classList.add('wrong');
                if (!isWrongBookMode) {
                    WrongBookManager.add(question, settings.mode, 'wrong', userAnswer);
                }
                PointsManager.addPoints(2, '答题参与');
                PointsManager.resetStreak();
            }
            
            if (!isWrongBookMode) {
                QuestionHistoryManager.recordAttempt(question, isCorrect);
                QuestionHistoryManager.syncToCloud();
            }
            
            questionStates[currentIndex] = {
                answered: true,
                userAnswer: userAnswer,
                isCorrect: isCorrect
            };
            
            skippedIndices.delete(currentIndex);
            
            document.querySelector('.submit-btn').disabled = true;
            
            const answerReveal = document.createElement('div');
            answerReveal.className = 'answer-reveal';
            answerReveal.innerHTML = `
                <div class="label">正确答案：${correctAnswer}</div>
            `;
            document.getElementById('optionsList').appendChild(answerReveal);
            
            if (autoShowAnalysis) {
                document.getElementById('analysisText').textContent = question.note || '暂无解析';
                document.getElementById('analysisBox').classList.add('show');
            }
            
            updateButtons();
            updateSkippedCount();
        }

        function submitBrief() {
            if (answered) return;
            answered = true;
            
            const question = currentQuestions[currentIndex];
            const textarea = document.getElementById('briefInput');
            const userAnswer = textarea.value.trim();
            
            questionStates[currentIndex] = {
                answered: true,
                userAnswer: userAnswer
            };
            
            skippedIndices.delete(currentIndex);
            
            document.querySelector('.submit-btn').disabled = true;
            
            const answerReveal = document.createElement('div');
            answerReveal.className = 'answer-reveal';
            answerReveal.innerHTML = `
                <div class="label">参考答案：</div>
                <div>${question.a}</div>
            `;
            document.getElementById('optionsList').appendChild(answerReveal);
            
            // 简答题完成即得积分
            if (userAnswer.length > 10) {
                PointsManager.addPoints(8, '简答题作答');
            } else {
                PointsManager.addPoints(5, '简答题作答');
            }
            
            if (autoShowAnalysis) {
                document.getElementById('analysisText').textContent = question.note || '暂无解析';
                document.getElementById('analysisBox').classList.add('show');
            }
            
            updateButtons();
            updateSkippedCount();
        }

        function updateSkippedCount() {
            const question = currentQuestions[currentIndex];
            let skippedText = '';
            if (skippedIndices.size > 0) {
                skippedText = `<span class="skipped-count">（已跳过 ${skippedIndices.size} 题）</span>`;
            }
            
            let historyTag = '';
            const history = QuestionHistoryManager.getHistory(question);
            if (history) {
                const accuracy = Math.round((history.correctCount / history.totalAttempts) * 100);
                historyTag = `<span class="question-history-tag done">已做${history.totalAttempts}次 ${accuracy}%</span>`;
            } else {
                historyTag = `<span class="question-history-tag new">新</span>`;
            }
            
            document.getElementById('questionNumber').innerHTML = `第 ${currentIndex + 1} 题 / 共 ${currentQuestions.length} 题 ${skippedText}<span class="question-type-tag">${getTypeName(question.type)}</span>${historyTag}`;
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        function skipQuestion() {
            if (!questionStates[currentIndex] || !questionStates[currentIndex].answered) {
                skippedIndices.add(currentIndex);
                const question = currentQuestions[currentIndex];
                if (!isWrongBookMode) {
                    WrongBookManager.add(question, settings.mode, 'skipped', '');
                }
            }
            
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= currentQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showResult() {
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultContainer').classList.add('active');
            
            const percentage = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('resultScore').textContent = `${score}/${currentQuestions.length}`;
            document.getElementById('resultText').textContent = `正确率：${percentage}%`;
            
            document.getElementById('progressFill').style.width = '100%';
            
            // 完成一套题目的积分奖励
            PointsManager.addPoints(30, '完成一套题目');
            
            // 全对奖励
            if (score === currentQuestions.length) {
                PointsManager.addPoints(100, '完美通关！全部答对');
            }
            
            checkAndNotifyBadges();
        }

        function restartQuiz() {
            startQuiz();
        }

        function backToSettings() {
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultContainer').classList.remove('active');
            document.querySelector('.settings-card').classList.remove('hidden');
            updateHistoryStats();
        }

        (function() {
            const track = document.getElementById('sliderTrack');
            const thumb = document.getElementById('sliderThumb');
            const min = 5;
            const max = 50;
            const step = 5;
            const steps = (max - min) / step + 1;
            let isDragging = false;

            function valueToPercent(value) {
                return ((value - min) / (max - min)) * 100;
            }

            function percentToValue(percent) {
                let rawValue = min + (percent / 100) * (max - min);
                let steppedValue = Math.round(rawValue / step) * step;
                return Math.max(min, Math.min(max, steppedValue));
            }

            function updateThumb(value) {
                const percent = valueToPercent(value);
                thumb.style.left = percent + '%';
                settings.count = value;
            }

            function handleMove(clientX) {
                const rect = track.getBoundingClientRect();
                let percent = ((clientX - rect.left) / rect.width) * 100;
                percent = Math.max(0, Math.min(100, percent));
                const value = percentToValue(percent);
                updateThumb(value);
            }

            thumb.addEventListener('mousedown', function(e) {
                isDragging = true;
                thumb.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    handleMove(e.clientX);
                }
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    thumb.style.cursor = 'grab';
                }
            });

            thumb.addEventListener('touchstart', function(e) {
                isDragging = true;
                e.preventDefault();
            });

            document.addEventListener('touchmove', function(e) {
                if (isDragging && e.touches.length > 0) {
                    handleMove(e.touches[0].clientX);
                }
            });

            document.addEventListener('touchend', function() {
                isDragging = false;
            });

            track.addEventListener('click', function(e) {
                if (e.target !== thumb) {
                    handleMove(e.clientX);
                }
            });

            updateThumb(settings.count);
        })();

        const BadgeChecker = {
            BADGES: [
                { id: '100_questions', name: '初试锋芒', desc: '累计答题100道', rarity: 'common', type: 'quiz', target: 100 },
                { id: '500_questions', name: '勤学不辍', desc: '累计答题500道', rarity: 'common', type: 'quiz', target: 500 },
                { id: '1000_questions', name: '博闻强识', desc: '累计答题1000道', rarity: 'rare', type: 'quiz', target: 1000 },
                { id: '2000_questions', name: '学海无涯', desc: '累计答题2000道', rarity: 'epic', type: 'quiz', target: 2000 },
                { id: 'honglou_characters', name: '金陵十二钗', desc: '红楼梦人物题全掌握', rarity: 'rare', type: 'mastery', category: 'honglou_character', target: 0.8 },
                { id: 'sanguo_strategists', name: '卧龙凤雏', desc: '三国谋士题全掌握', rarity: 'rare', type: 'mastery', category: 'sanguo_strategist', target: 0.8 },
                { id: 'shuihu_heroes', name: '一百零八将', desc: '水浒人物题全掌握', rarity: 'rare', type: 'mastery', category: 'shuihu_character', target: 0.8 },
                { id: 'xiyou_plot', name: '九九八十一难', desc: '西游情节题全掌握', rarity: 'rare', type: 'mastery', category: 'xiyou_plot', target: 0.8 },
                { id: 'poetry_master', name: '诗词雅士', desc: '诗词填空题全掌握', rarity: 'epic', type: 'mastery', category: 'poetry', target: 0.8 }
            ],
            
            STORAGE_KEY: 'badge_data_v1',
            HISTORY_KEY: 'quiz_history_v1',
            MASTERY_KEY: 'category_mastery_v1',
            
            getData() {
                try {
                    const data = localStorage.getItem(this.STORAGE_KEY);
                    return data ? JSON.parse(data) : {
                        unlockedBadges: [],
                        badgeUnlockTime: {},
                        readingProgress: {
                            xiyou: { stage1: false, stage2: false, stage3: false },
                            sanguo: { stage1: false, stage2: false, stage3: false },
                            shuihu: { stage1: false, stage2: false, stage3: false },
                            honglou: { stage1: false, stage2: false, stage3: false }
                        }
                    };
                } catch (e) {
                    return {
                        unlockedBadges: [],
                        badgeUnlockTime: {},
                        readingProgress: {
                            xiyou: { stage1: false, stage2: false, stage3: false },
                            sanguo: { stage1: false, stage2: false, stage3: false },
                            shuihu: { stage1: false, stage2: false, stage3: false },
                            honglou: { stage1: false, stage2: false, stage3: false }
                        }
                    };
                }
            },
            
            saveData(data) {
                try {
                    safeSaveData(this.STORAGE_KEY, data);
                } catch (e) {
                    console.error('保存勋章数据失败:', e);
                }
            },
            
            getTotalQuizCount() {
                try {
                    const data = localStorage.getItem(this.HISTORY_KEY);
                    const history = data ? JSON.parse(data) : {};
                    let total = 0;
                    Object.values(history).forEach(item => {
                        total += item.totalAttempts || 0;
                    });
                    return total;
                } catch (e) {
                    return 0;
                }
            },
            
            getCategoryMastery(category) {
                try {
                    const statsData = localStorage.getItem('category_stats_v1');
                    if (statsData) {
                        const stats = JSON.parse(statsData);
                        if (stats[category] && stats[category].total > 0) {
                            return stats[category].correct / stats[category].total;
                        }
                    }
                    const data = localStorage.getItem(this.MASTERY_KEY);
                    if (data) {
                        const mastery = JSON.parse(data);
                        return mastery[category] || 0;
                    }
                } catch (e) {}
                return 0;
            },
            
            setCategoryMastery(category, value) {
                try {
                    let mastery = {};
                    const data = localStorage.getItem(this.MASTERY_KEY);
                    if (data) {
                        mastery = JSON.parse(data);
                    }
                    mastery[category] = value;
                    safeSaveData(this.MASTERY_KEY, mastery);
                } catch (e) {}
            },
            
            checkAndUnlockBadges() {
                const data = this.getData();
                const newlyUnlocked = [];
                
                this.BADGES.forEach(badge => {
                    if (data.unlockedBadges.includes(badge.id)) return;
                    
                    let shouldUnlock = false;
                    
                    if (badge.type === 'quiz') {
                        const count = this.getTotalQuizCount();
                        shouldUnlock = count >= badge.target;
                    } else if (badge.type === 'mastery') {
                        const mastery = this.getCategoryMastery(badge.category);
                        shouldUnlock = mastery >= badge.target;
                    }
                    
                    if (shouldUnlock) {
                        data.unlockedBadges.push(badge.id);
                        data.badgeUnlockTime[badge.id] = Date.now();
                        newlyUnlocked.push(badge);
                    }
                });
                
                if (newlyUnlocked.length > 0) {
                    this.saveData(data);
                }
                
                return newlyUnlocked;
            }
        };

        function checkAndNotifyBadges() {
            const newlyUnlocked = BadgeChecker.checkAndUnlockBadges();
            
            if (newlyUnlocked.length > 0) {
                safeSaveData('pending_badge_notification', newlyUnlocked[0].id);
                showBadgeNotification(newlyUnlocked[0]);
            }
        }

        function showBadgeNotification(badge) {
            const existing = document.getElementById('badgeNotificationOverlay');
            if (existing) existing.remove();
            
            const overlay = document.createElement('div');
            overlay.id = 'badgeNotificationOverlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.6);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10000;
                opacity: 0;
                transition: opacity 0.3s;
            `;
            
            const rarityColors = {
                common: { border: '#d4af37', shadow: 'rgba(212, 175, 55, 0.5)' },
                rare: { border: '#9c27b0', shadow: 'rgba(156, 39, 176, 0.5)' },
                epic: { border: '#ff6b35', shadow: 'rgba(255, 107, 53, 0.5)' }
            };
            const colors = rarityColors[badge.rarity] || rarityColors.common;
            
            overlay.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #fff9e6, #fff);
                    border-radius: 20px;
                    padding: 40px 50px;
                    text-align: center;
                    max-width: 350px;
                    border: 4px solid ${colors.border};
                    box-shadow: 0 10px 40px ${colors.shadow};
                    transform: scale(0.8);
                    transition: transform 0.3s;
                ">
                    <div style="font-size: 1.5rem; color: #8b4513; margin-bottom: 20px;">🎉 恭喜获得勋章！</div>
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">🎖️</div>
                    <div style="font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; color: ${colors.border};">${badge.name}</div>
                    <div style="color: #666; margin-bottom: 20px;">${badge.desc}</div>
                    <button onclick="closeBadgeNotification()" style="
                        background: #8b4513;
                        color: #fff;
                        border: none;
                        padding: 10px 30px;
                        border-radius: 20px;
                        font-size: 1rem;
                        cursor: pointer;
                    ">太棒了！</button>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                overlay.style.opacity = '1';
                overlay.querySelector('div').style.transform = 'scale(1)';
            }, 10);
        }

        function closeBadgeNotification() {
            const overlay = document.getElementById('badgeNotificationOverlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 300);
            }
        }

        async function initQuizPage() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
            const userId = sessionStorage.getItem('userId');
            const username = sessionStorage.getItem('currentUser');
            
            if (isLoggedIn && (userId || username)) {
                await QuestionHistoryManager.loadQuizDataFromCloud();
            }
            
            updateHistoryStats();
            updateItemsBar();
        }

        initQuizPage();
    </script>
