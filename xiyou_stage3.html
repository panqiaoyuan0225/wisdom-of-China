"拾陆 · 文化影响": `
<h3>一、文学影响</h3>
<p>
    《西游记》是中国古典四大名著之一，是中国古代浪漫主义文学的巅峰之作。它以丰富的想象力、精彩的故事情节、鲜明的人物形象，对后世文学产生了深远的影响。
</p>
<p>
    后世许多文学作品都受到《西游记》的启发，如《封神演义》、《镜花缘》等。现代网络文学中，"西游"题材更是层出不穷，成为一个重要的文学流派。
</p>

<h3>二、戏曲影响</h3>
<p>
    《西游记》的故事被改编成各种戏曲形式，如京剧、昆曲、越剧等。其中，京剧《大闹天宫》、《三打白骨精》等更是经典剧目，久演不衰。
</p>
<p>
    戏曲艺术家们通过精湛的表演，将孙悟空、猪八戒等人物形象栩栩如生地展现在舞台上，深受观众喜爱。
</p>

<h3>三、影视影响</h3>
<p>
    1986年，央视版电视剧《西游记》播出，成为中国电视剧史上的经典之作。该剧由杨洁执导，六小龄童、迟重瑞等主演，一经播出，便轰动全国，至今仍是寒暑假重播次数最多的电视剧之一。
</p>
<p>
    除了电视剧，《西游记》还被改编成许多电影、动画作品，如《大闹天宫》动画片、《大话西游》系列电影等，都深受观众喜爱。
</p>

<h3>四、民俗影响</h3>
<p>

</p>
<p>

</p>

<h3>五、国际影响</h3>
<p>
    《西游记》不仅在中国影响深远，在世界范围内也有广泛的影响。它被翻译成多种语言，在世界各地传播。
</p>
<p>
    许多国家的读者都对《西游记》中的故事和人物形象充满兴趣，孙悟空更是成为中国文化的重要符号之一。
</p>

<div style="background: #fff4d6; padding: 20px; border-left: 6px solid #C02C3F; border-radius: 8px; margin-top: 20px;">

function startQuiz() {
    const cover = document.getElementById('quiz-cover');
    const content = document.getElementById('quiz-content');
    
    if (cover) cover.style.display = 'none';
    if (content) content.style.display = 'block';
    
    renderQuestions(); 
}

function renderQuestions() {
    const container = document.getElementById('quiz-app');
    const questions = GLOBAL_QUIZ_DATA;
    if (!container) {
        console.error("找不到 quiz-app 容器！");
        return;
    }
    container.innerHTML = "";
    const sections = [
        { title: '第一部分：选择题（1-50题）', type: '选择' },
        { title: '第二部分：填空题（51-95题）', type: '填空' },
        { title: '第三部分：简答题（96-100题）', type: '简答' }
    ];

    sections.forEach(sec => {
        const filtered = questions.filter(item => item.type === sec.type);
        if (filtered.length > 0) {
            const header = document.createElement('h2');
            header.style.cssText = "color:#008b8b; border-bottom:2px solid #FFD700; margin-top:40px; padding-bottom:10px;";
            header.innerText = sec.title;
            container.appendChild(header);

            filtered.forEach((item, idx) => {
                const qId = "q-" + sec.type + "-" + idx;
                const div = document.createElement('div');
                div.style.cssText = "margin-bottom:30px; padding:20px; background: rgba(255, 252, 230, 0.95); border:1px solid #d2c5a7; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);";

                let html = "<p style='font-size:1.1rem; font-family: STKaiti, Microsoft YaHei, serif;'><strong>" + (idx + 1) + ".</strong> " + item.q + "</p>";

                if (item.type === '选择') {
                    const opts = item.options.split('|');
                    html += "<div style='display:flex; flex-wrap:wrap; gap:10px; margin-top:15px;'>";
                    opts.forEach(opt => {
                        const val = opt.trim().charAt(0);
                        html += "<button onclick=\"checkSelect(this, '" + val + "', '" + item.a + "', '" + qId + "')\" style='padding:8px 20px; border:1px solid #8b4513; background: rgba(255, 255, 255, 0.7); cursor:pointer; border-radius:4px; transition:0.3s; font-family: STKaiti, Microsoft YaHei, serif;'>" + opt.trim() + "</button>";
                    });
                    html += "</div>";
                } else if (item.type === '填空') {
                    html += "<div style='margin-top:15px;'><input type='text' id='input-" + qId + "' placeholder='在此输入答案...' style='padding:10px; width:250px; border:1px solid #8b4513; border-radius:4px; font-family: STKaiti, Microsoft YaHei, serif;'><button onclick=\"checkFill('" + qId + "', '" + item.a + "')\" style='padding:10px 20px; background:#008b8b; color:#FFD700; border:none; border-radius:4px; margin-left:10px; cursor:pointer; font-family: STKaiti, Microsoft YaHei, serif;'>提交</button></div>";
                } else {
                    html += "<div style='margin-top:15px;'><textarea id='input-" + qId + "' placeholder='请阐述你的见解...' style='padding:10px; width:100%; height:80px; border:1px solid #8b4513; border-radius:4px; font-family: STKaiti, Microsoft YaHei, serif;'></textarea><button onclick=\"checkBrief('" + qId + "')\" style='padding:10px 20px; background:#C02C3F; color:white; border:none; border-radius:4px; margin-top:10px; cursor:pointer; font-family: STKaiti, Microsoft YaHei, serif;'>完成思考</button></div>";
                }

                html += "<div id='feedback-" + qId + "' style='margin-top:15px; display:none;'></div><details id='note-" + qId + "' style='margin-top:10px; display:none;'><summary style='color:#C02C3F; cursor:pointer; font-weight:bold; font-family: STKaiti, Microsoft YaHei, serif;'>查看解析</summary><div style='margin-top:10px; padding:12px; background: rgba(255, 248, 230, 0.9); border-left:4px solid #C02C3F; font-size:0.9rem; font-family: STKaiti, Microsoft YaHei, serif;'><strong>解析：</strong>" + item.note + "</div></details>";

                div.innerHTML = html;
                container.appendChild(div);
            });
        }
    });
}

function checkSelect(btn, userVal, correctVal, qId) {
    const feedback = document.getElementById("feedback-" + qId);
    const note = document.getElementById("note-" + qId);
    feedback.style.display = "block";
    note.style.display = "block";

    if (userVal === correctVal) {
        btn.style.background = "#dcfce7";
        btn.style.borderColor = "#16a34a";
        feedback.innerHTML = "<span style='color:#16a34a; font-weight:bold; font-family: STKaiti, Microsoft YaHei, serif;'>✅ 回答正确！</span>";
    } else {
        btn.style.background = "#fee2e2";
        btn.style.borderColor = "#ef4444";
        feedback.innerHTML = "<span style='color:#ef4444; font-weight:bold; font-family: STKaiti, Microsoft YaHei, serif;'>❌ 回答错误，正确答案是 " + correctVal + "</span>";
    }
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.onclick = null);
}

function checkFill(qId, correctVal) {
    const input = document.getElementById("input-" + qId);
    const feedback = document.getElementById("feedback-" + qId);
    const note = document.getElementById("note-" + qId);
    feedback.style.display = "block";
    note.style.display = "block";

    if (input.value.trim().toLowerCase() === correctVal.toLowerCase()) {
        feedback.innerHTML = "<span style='color:#16a34a; font-weight:bold; font-family: STKaiti, Microsoft YaHei, serif;'>✅ 恭喜，完全正确！</span>";
        input.style.borderColor = "#16a34a";
    } else {
        feedback.innerHTML = "<span style='color:#ef4444; font-weight:bold; font-family: STKaiti, Microsoft YaHei, serif;'>❌ 正确答案是：" + correctVal + "</span>";
        input.style.borderColor = "#ef4444";
    }
}

function checkBrief(qId) {
    const feedback = document.getElementById("feedback-" + qId);
    const note = document.getElementById("note-" + qId);
    feedback.style.display = "block";
    note.style.display = "block";
    feedback.innerHTML = "<span style='color:#333; font-weight:bold; font-family: STKaiti, Microsoft YaHei, serif;'>💡 已记录你的思考。请对照解析自我核对：</span>";
}

function changeTab(element, title) {
    const items = document.querySelectorAll('.nav-item');
    items.forEach(item => item.classList.remove('active'));
    element.classList.add('active');

    document.getElementById('content-title').innerText = title;
    const body = document.getElementById('content-body');
    if (contentData[title]) {
        body.innerHTML = contentData[title];
    }
}

window.onload = function() {
    changeTab(document.querySelector('.nav-item'), '拾叁 · 取得真经');
};

const BadgeManager = {
    STORAGE_KEY: 'badge_data_v1',
    
    getData() {
        try {
            const data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : {
                unlockedBadges: [],
                badgeUnlockTime: {},
                readingProgress: {
                    xiyou: { stage1: false, stage2: false, stage3: false },
                    sanguo: { stage1: false, stage2: false, stage3: false },
                    shuihu: { stage1: false, stage2: false, stage3: false },
                    honglou: { stage1: false, stage2: false, stage3: false }
                }
            };
        } catch (e) {
            return {
                unlockedBadges: [],
                badgeUnlockTime: {},
                readingProgress: {
                    xiyou: { stage1: false, stage2: false, stage3: false },
                    sanguo: { stage1: false, stage2: false, stage3: false },
                    shuihu: { stage1: false, stage2: false, stage3: false },
                    honglou: { stage1: false, stage2: false, stage3: false }
                }
            };
        }
    },
    
    saveData(data) {
        try {
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
            console.error('保存勋章数据失败:', e);
        }
    },
    
    isStageRead(book, stage) {
        const data = this.getData();
        return data.readingProgress[book] && data.readingProgress[book]['stage' + stage];
    },
    
    markStageRead(book, stage) {
        const data = this.getData();
        if (!data.readingProgress[book]) {
            data.readingProgress[book] = { stage1: false, stage2: false, stage3: false };
        }
        data.readingProgress[book]['stage' + stage] = true;
        this.saveData(data);
        return this.checkAndUnlockBadges();
    },
    
    isBookCompleted(book) {
        const data = this.getData();
        const progress = data.readingProgress[book];
        return progress && progress.stage1 && progress.stage2 && progress.stage3;
    },
    
    getCompletedBooksCount() {
        let count = 0;
        ['xiyou', 'sanguo', 'shuihu', 'honglou'].forEach(book => {
            if (this.isBookCompleted(book)) count++;
        });
        return count;
    },
    
    checkAndUnlockBadges() {
        const data = this.getData();
        const newlyUnlocked = [];
        
        const bookBadges = [
            { id: 'xiyou_reader', name: '西游行者', desc: '完成西游记阅读', book: 'xiyou' },
            { id: 'sanguo_reader', name: '三国通览', desc: '完成三国演义阅读', book: 'sanguo' },
            { id: 'shuihu_reader', name: '水浒知音', desc: '完成水浒传阅读', book: 'shuihu' },
            { id: 'honglou_reader', name: '红楼初探', desc: '完成红楼梦阅读', book: 'honglou' },
            { id: 'all_books_reader', name: '四大名著通', desc: '完成全部名著阅读', book: 'all' }
        ];
        
        bookBadges.forEach(badge => {
            if (data.unlockedBadges.includes(badge.id)) return;
            
            let shouldUnlock = false;
            if (badge.book === 'all') {
                shouldUnlock = this.getCompletedBooksCount() >= 4;
            } else {
                shouldUnlock = this.isBookCompleted(badge.book);
            }
            
            if (shouldUnlock) {
                data.unlockedBadges.push(badge.id);
                data.badgeUnlockTime[badge.id] = Date.now();
                newlyUnlocked.push(badge);
            }
        });
        
        if (newlyUnlocked.length > 0) {
            this.saveData(data);
        }
        
        return newlyUnlocked;
    }
};

function showBadgeNotification(badge) {
    document.getElementById('badgeName').textContent = badge.name;
    document.getElementById('badgeDesc').textContent = badge.desc;
    
    const card = document.getElementById('badgeCard');
    const rarityColors = {
        common: '#d4af37',
        rare: '#9c27b0',
        epic: '#ff6b35'
    };
    const color = rarityColors[badge.rarity] || rarityColors.common;
    card.style.border = '4px solid ' + color;
    card.style.boxShadow = '0 10px 40px ' + color + '80';
    document.getElementById('badgeName').style.color = color;
    
    document.getElementById('badgeNotification').classList.add('show');
}

function closeBadgeNotification() {
    document.getElementById('badgeNotification').classList.remove('show');
}

let autoReadStartTime = Date.now();
let hasScrolledEnough = false;
const MIN_READ_TIME = 30000;
const SCROLL_THRESHOLD = 0.8;
let autoReadMarked = false;

function initAutoReadTracking() {
    if (BadgeManager.isStageRead('xiyou', 3)) {
        autoReadMarked = true;
        return;
    }
    
    const mainContent = document.querySelector('.main-content');
    
    mainContent.addEventListener('scroll', function() {
        if (autoReadMarked) return;
        
        const scrollPercent = (mainContent.scrollTop + mainContent.clientHeight) / mainContent.scrollHeight;
        if (scrollPercent >= SCROLL_THRESHOLD) {
            hasScrolledEnough = true;
            checkAndMarkAutoRead();
        }
    });
    
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && !autoReadMarked) {
            checkAndMarkAutoRead();
        }
    });
    
    window.addEventListener('beforeunload', function() {
        if (!autoReadMarked) {
            checkAndMarkAutoRead();
        }
    });
}

function checkAndMarkAutoRead() {
    if (autoReadMarked) return;
    
    const readTime = Date.now() - autoReadStartTime;
    if (readTime >= MIN_READ_TIME && hasScrolledEnough) {
        const newlyUnlocked = BadgeManager.markStageRead('xiyou', 3);
        autoReadMarked = true;
        
        if (newlyUnlocked.length > 0) {
            localStorage.setItem('pending_badge_notification', newlyUnlocked[0].id);
        }
    }
}

window.addEventListener('load', function() {
    initAutoReadTracking();
});
