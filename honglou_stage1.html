let mindmapInitialized = false;
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let lastX = 0;
let lastY = 0;
let selectedNode = 'jiamu';
let expandedNodes = new Set(['jiamu']);
let clickStartTime = 0;
let clickStartX = 0;
let clickStartY = 0;

const nodes = [
    { id: 'jiamu', name: '贾母', x: 400, y: 80, color: '#b03060', radius: 40 },
    { id: 'jiashe', name: '贾赦', x: 200, y: 180, color: '#d4708a', radius: 32 },
    { id: 'jiazheng', name: '贾政', x: 400, y: 180, color: '#d4708a', radius: 32 },
    { id: 'jiamin', name: '贾敏', x: 600, y: 180, color: '#d4708a', radius: 32 },
    { id: 'xiangyun', name: '史湘云', x: 750, y: 180, color: '#d4af37', radius: 28 },

    { id: 'wangfuren', name: '王夫人', x: 300, y: 280, color: '#d4af37', radius: 28 },
    { id: 'linruhai', name: '林如海', x: 500, y: 280, color: '#888', radius: 28 },

    { id: 'jiaying', name: '迎春', x: 250, y: 380, color: '#d4708a', radius: 26 },
    { id: 'jiayuan', name: '元春', x: 350, y: 380, color: '#d4708a', radius: 26 },
    { id: 'baoyu', name: '宝玉', x: 450, y: 380, color: '#b03060', radius: 34 },
    { id: 'jiatan', name: '探春', x: 550, y: 380, color: '#d4708a', radius: 26 },
    { id: 'daiyu', name: '黛玉', x: 650, y: 380, color: '#b03060', radius: 30 },
    { id: 'wangxifeng', name: '王熙凤', x: 150, y: 480, color: '#b03060', radius: 30 },
    { id: 'jiaqiaojie', name: '巧姐', x: 150, y: 570, color: '#d4708a', radius: 22 },
    { id: 'baochai', name: '宝钗', x: 450, y: 480, color: '#d4af37', radius: 30 },
    { id: 'xueyi', name: '薛姨妈', x: 350, y: 480, color: '#d4af37', radius: 26 },
];

const edges = [
    { from: 'jiamu', to: 'jiashe', type: 'blood' },
    { from: 'jiamu', to: 'jiazheng', type: 'blood' },
    { from: 'jiamu', to: 'jiamin', type: 'blood' },
    { from: 'jiamu', to: 'xiangyun', type: 'blood' },
    { from: 'jiashe', to: 'xingfuren', type: 'marriage' },
    { from: 'jiazheng', to: 'wangfuren', type: 'marriage' },
    { from: 'jiamin', to: 'linruhai', type: 'marriage' },
    { from: 'jiashe', to: 'jialian', type: 'blood' },
    { from: 'jiashe', to: 'jiaying', type: 'blood' },
    { from: 'jiazheng', to: 'jiayuan', type: 'blood' },
    { from: 'jiazheng', to: 'baoyu', type: 'blood' },
    { from: 'jiazheng', to: 'jiatan', type: 'blood' },
    { from: 'jiamin', to: 'daiyu', type: 'blood' },
    { from: 'jialian', to: 'wangxifeng', type: 'marriage' },
    { from: 'wangfuren', to: 'wangxifeng', type: 'blood' },
    { from: 'jialian', to: 'jiaqiaojie', type: 'blood' },
    { from: 'wangfuren', to: 'xueyi', type: 'blood' },
    { from: 'xueyi', to: 'baochai', type: 'blood' },
    { from: 'baoyu', to: 'daiyu', type: 'love', dashed: true },
    { from: 'baoyu', to: 'baochai', type: 'love', dashed: true },
];

function getConnectedNodes(nodeId) {
    const connected = new Set();
    edges.forEach(edge => {
        if (edge.from === nodeId) connected.add(edge.to);
        if (edge.to === nodeId) connected.add(edge.from);
    });
    return connected;
}

function initMindmap() {
    const container = document.getElementById('mindmap-container');
    const canvas = document.getElementById('mindmap-canvas');
    if (!canvas || !container) return;
    
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;
    
    drawMindmap();
    
    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('mouseleave', handleMouseUp);
    
    mindmapInitialized = true;
}

function drawMindmap() {
    const canvas = document.getElementById('mindmap-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    
    const visibleNodes = new Set(expandedNodes);
    expandedNodes.forEach(nodeId => {
        getConnectedNodes(nodeId).forEach(id => visibleNodes.add(id));
    });
    
    edges.forEach(edge => {
        if (!visibleNodes.has(edge.from) || !visibleNodes.has(edge.to)) return;
        if (!expandedNodes.has(edge.from) && !expandedNodes.has(edge.to)) return;
        
        const fromNode = nodes.find(n => n.id === edge.from);
        const toNode = nodes.find(n => n.id === edge.to);
        if (!fromNode || !toNode) return;
        
        ctx.beginPath();
        ctx.moveTo(fromNode.x, fromNode.y);
        ctx.lineTo(toNode.x, toNode.y);
        
        if (edge.type === 'blood') {
            ctx.strokeStyle = '#b03060';
            ctx.lineWidth = 2;
        } else if (edge.type === 'marriage') {
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 2;
        } else if (edge.type === 'love') {
            ctx.strokeStyle = '#b03060';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
        }
        
        ctx.stroke();
        ctx.setLineDash([]);
    });
    
    nodes.forEach(node => {
        if (!visibleNodes.has(node.id)) return;
        
        const isExpanded = expandedNodes.has(node.id);
        const isSelected = selectedNode === node.id;
        const connectedNodes = getConnectedNodes(node.id);
        const hasHiddenConnections = [...connectedNodes].some(id => !visibleNodes.has(id));
        
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        
        if (isSelected) {
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = node.color;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = node.color;
        } else {
            ctx.fillStyle = node.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#fff';
        }
        
        ctx.font = 'bold 13px "Microsoft YaHei", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.name, node.x, node.y);
        
        if (hasHiddenConnections) {
            ctx.beginPath();
            ctx.arc(node.x + node.radius - 5, node.y - node.radius + 5, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#d4af37';
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px Arial';
            ctx.fillText('+', node.x + node.radius - 5, node.y - node.radius + 5);
        } else if (isExpanded && connectedNodes.size > 0 && node.id !== 'jiamu') {
            ctx.beginPath();
            ctx.arc(node.x + node.radius - 5, node.y - node.radius + 5, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#b03060';
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px Arial';
            ctx.fillText('−', node.x + node.radius - 5, node.y - node.radius + 5);
        }
    });
    
    ctx.restore();
}

function getNodeAtPosition(x, y) {
    const canvas = document.getElementById('mindmap-canvas');
    const rect = canvas.getBoundingClientRect();
    const canvasX = (x - rect.left - offsetX) / scale;
    const canvasY = (y - rect.top - offsetY) / scale;
    
    for (let i = nodes.length - 1; i >= 0; i--) {
        const node = nodes[i];
        const dx = canvasX - node.x;
        const dy = canvasY - node.y;
        if (dx * dx + dy * dy <= node.radius * node.radius) {
            return node;
        }
    }
    return null;
}

function handleMouseDown(e) {
    clickStartTime = Date.now();
    clickStartX = e.clientX;
    clickStartY = e.clientY;
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
}

function handleMouseMove(e) {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    offsetX += dx;
    offsetY += dy;
    lastX = e.clientX;
    lastY = e.clientY;
    drawMindmap();
}

function handleMouseUp(e) {
    const clickDuration = Date.now() - clickStartTime;
    const moveDistance = Math.sqrt(
        Math.pow(e.clientX - clickStartX, 2) + 
        Math.pow(e.clientY - clickStartY, 2)
    );
    
    if (clickDuration < 300 && moveDistance < 10) {
        const node = getNodeAtPosition(e.clientX, e.clientY);
        if (node) {
            selectedNode = node.id;
            
            if (node.id === 'jiamu') {
                expandedNodes.add(node.id);
            } else if (expandedNodes.has(node.id)) {
                expandedNodes.delete(node.id);
            } else {
                expandedNodes.add(node.id);
            }
        }
    }
    
    isDragging = false;
    drawMindmap();
}

function zoomIn() {
    if (scale < 3) {
        scale *= 1.2;
        drawMindmap();
    }
}

function zoomOut() {
    if (scale > 0.3) {
        scale *= 0.8;
        drawMindmap();
    }
}

function resetMap() {
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    selectedNode = 'jiamu';
    expandedNodes = new Set(['jiamu']);
    drawMindmap();
}

const BadgeManager = {
    STORAGE_KEY: 'badge_data_v1',
    
    getData() {
        try {
            const data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : {
                unlockedBadges: [],
                badgeUnlockTime: {},
                readingProgress: {
                    xiyou: { stage1: false, stage2: false, stage3: false },
                    sanguo: { stage1: false, stage2: false, stage3: false },
                    shuihu: { stage1: false, stage2: false, stage3: false },
                    honglou: { stage1: false, stage2: false, stage3: false }
                }
            };
        } catch (e) {
            return {
                unlockedBadges: [],
                badgeUnlockTime: {},
                readingProgress: {
                    xiyou: { stage1: false, stage2: false, stage3: false },
                    sanguo: { stage1: false, stage2: false, stage3: false },
                    shuihu: { stage1: false, stage2: false, stage3: false },
                    honglou: { stage1: false, stage2: false, stage3: false }
                }
            };
        }
    },
    
    saveData(data) {
        try {
            window.DataManager.saveData(this.STORAGE_KEY, data);
        } catch (e) {
            console.error('保存勋章数据失败:', e);
        }
    },
    
    isStageRead(book, stage) {
        const data = this.getData();
        if (!data.readingProgress) {
            return false;
        }
        return data.readingProgress[book] && data.readingProgress[book]['stage' + stage];
    },
    
    markStageRead(book, stage) {
        const data = this.getData();
        if (!data.readingProgress[book]) {
            data.readingProgress[book] = { stage1: false, stage2: false, stage3: false };
        }
        data.readingProgress[book]['stage' + stage] = true;
        this.saveData(data);
        return this.checkAndUnlockBadges();
    },
    
    isBookCompleted(book) {
        const data = this.getData();
        const progress = data.readingProgress[book];
        return progress && progress.stage1 && progress.stage2 && progress.stage3;
    },
    
    getCompletedBooksCount() {
        let count = 0;
        ['xiyou', 'sanguo', 'shuihu', 'honglou'].forEach(book => {
            if (this.isBookCompleted(book)) count++;
        });
        return count;
    },
    
    checkAndUnlockBadges() {
        const data = this.getData();
        const newlyUnlocked = [];
        
        const bookBadges = [
            { id: 'xiyou_reader', name: '西游行者', desc: '完成西游记阅读', book: 'xiyou' },
            { id: 'sanguo_reader', name: '三国通览', desc: '完成三国演义阅读', book: 'sanguo' },
            { id: 'shuihu_reader', name: '水浒知音', desc: '完成水浒传阅读', book: 'shuihu' },
            { id: 'honglou_reader', name: '红楼初探', desc: '完成红楼梦阅读', book: 'honglou' },
            { id: 'all_books_reader', name: '四大名著通', desc: '完成全部名著阅读', book: 'all' }
        ];
        
        bookBadges.forEach(badge => {
            if (data.unlockedBadges.includes(badge.id)) return;
            
            let shouldUnlock = false;
            if (badge.book === 'all') {
                shouldUnlock = this.getCompletedBooksCount() >= 4;
            } else {
                shouldUnlock = this.isBookCompleted(badge.book);
            }
            
            if (shouldUnlock) {
                data.unlockedBadges.push(badge.id);
                data.badgeUnlockTime[badge.id] = Date.now();
                newlyUnlocked.push(badge);
            }
        });
        
        if (newlyUnlocked.length > 0) {
            this.saveData(data);
        }
        
        return newlyUnlocked;
    }
};

let autoReadStartTime = Date.now();
let hasScrolledEnough = false;
const MIN_READ_TIME = 30000;
const SCROLL_THRESHOLD = 0.8;
let autoReadMarked = false;

function initAutoReadTracking() {
    if (BadgeManager.isStageRead('honglou', 1)) {
        autoReadMarked = true;
        return;
    }
    
    const mainContent = document.querySelector('.main-content');
    
    mainContent.addEventListener('scroll', function() {
        if (autoReadMarked) return;
        
        const scrollPercent = (mainContent.scrollTop + mainContent.clientHeight) / mainContent.scrollHeight;
        if (scrollPercent >= SCROLL_THRESHOLD) {
            hasScrolledEnough = true;
            checkAndMarkAutoRead();
        }
    });
    
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && !autoReadMarked) {
            checkAndMarkAutoRead();
        }
    });
    
    window.addEventListener('beforeunload', function() {
        if (!autoReadMarked) {
            checkAndMarkAutoRead();
        }
    });
}

function checkAndMarkAutoRead() {
    if (autoReadMarked) return;
    
    const readTime = Date.now() - autoReadStartTime;
    if (readTime >= MIN_READ_TIME && hasScrolledEnough) {
        const newlyUnlocked = BadgeManager.markStageRead('honglou', 1);
        autoReadMarked = true;
        
        if (newlyUnlocked.length > 0) {
            window.DataManager.saveData('pending_badge_notification', newlyUnlocked[0].id);
        }
    }
}

function showBadgeNotification(badge) {
    document.getElementById('badgeName').textContent = badge.name;
    document.getElementById('badgeDesc').textContent = badge.desc;
    
    const card = document.getElementById('badgeCard');
    const rarityColors = {
        common: '#d4af37',
        rare: '#9c27b0',
        epic: '#ff6b35'
    };
    const color = rarityColors[badge.rarity] || rarityColors.common;
    card.style.border = '4px solid ' + color;
    card.style.boxShadow = '0 10px 40px ' + color + '80';
    document.getElementById('badgeName').style.color = color;
    
    document.getElementById('badgeNotification').classList.add('show');
}

function closeBadgeNotification() {
    document.getElementById('badgeNotification').classList.remove('show');
}

window.addEventListener('load', function() {
    initAutoReadTracking();
});

window.addEventListener('resize', () => {
    if (mindmapInitialized) {
        const container = document.getElementById('mindmap-container');
        const canvas = document.getElementById('mindmap-canvas');
        if (canvas && container) {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            drawMindmap();
        }
    }
});
