<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勋章墙</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            padding: 20px;
            padding-top: 60px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 40px;
            text-decoration: none;
            color: #f5f5dc;
            font-weight: bold;
            background: #8b4513;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .page-title {
            text-align: center;
            color: #8b4513;
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .stats-summary {
            max-width: 600px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fff9e6, #fff5d6);
            border-radius: 15px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #d4af37;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #8b4513;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .section {
            max-width: 900px;
            margin: 0 auto 40px;
        }

        .section-title {
            color: #8b4513;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .badge-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .badge-card.locked {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .badge-card.locked .badge-icon {
            filter: grayscale(1) brightness(0.7);
        }

        .badge-card.unlocked {
            animation: unlockPulse 0.5s ease;
        }

        @keyframes unlockPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .badge-card.common.unlocked {
            border: 3px solid #d4af37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .badge-card.rare.unlocked {
            border: 3px solid #9c27b0;
            background: linear-gradient(135deg, #fff, #f3e5f5);
            box-shadow: 0 4px 20px rgba(156, 39, 176, 0.3);
        }

        .badge-card.epic.unlocked {
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, #ff6b35, #f7931e, #ff6b35) border-box;
            box-shadow: 0 4px 25px rgba(255, 107, 53, 0.4);
            animation: epicGlow 2s ease-in-out infinite;
        }

        @keyframes epicGlow {
            0%, 100% { box-shadow: 0 4px 25px rgba(255, 107, 53, 0.4); }
            50% { box-shadow: 0 4px 35px rgba(255, 107, 53, 0.6); }
        }

        .badge-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            transition: transform 0.3s;
        }

        .badge-card.unlocked:hover .badge-icon {
            transform: scale(1.1);
        }

        .badge-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .badge-desc {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
        }

        .badge-rarity {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .badge-rarity.common {
            background: #fff9e6;
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        .badge-rarity.rare {
            background: #f3e5f5;
            color: #9c27b0;
            border: 1px solid #9c27b0;
        }

        .badge-rarity.epic {
            background: linear-gradient(135deg, #fff5f0, #ffe0d0);
            color: #ff6b35;
            border: 1px solid #ff6b35;
        }

        .progress-container {
            margin-top: 10px;
        }

        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .badge-card.common .progress-bar-fill {
            background: linear-gradient(90deg, #d4af37, #f0d78c);
        }

        .badge-card.rare .progress-bar-fill {
            background: linear-gradient(90deg, #9c27b0, #ce93d8);
        }

        .badge-card.epic .progress-bar-fill {
            background: linear-gradient(90deg, #ff6b35, #f7931e);
        }

        .progress-text {
            font-size: 0.8rem;
            color: #888;
        }

        .lock-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
            opacity: 0.5;
        }

        .unlock-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 8px;
        }

        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .notification-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .notification-card {
            background: linear-gradient(135deg, #fff9e6, #fff);
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
            max-width: 350px;
            position: relative;
        }

        .notification-overlay.show .notification-card {
            transform: scale(1);
        }

        .notification-card.common {
            border: 4px solid #d4af37;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.5);
        }

        .notification-card.rare {
            border: 4px solid #9c27b0;
            box-shadow: 0 10px 40px rgba(156, 39, 176, 0.5);
        }

        .notification-card.epic {
            border: 4px solid #ff6b35;
            box-shadow: 0 10px 40px rgba(255, 107, 53, 0.5);
            animation: epicNotify 1s ease-in-out infinite;
        }

        @keyframes epicNotify {
            0%, 100% { box-shadow: 0 10px 40px rgba(255, 107, 53, 0.5); }
            50% { box-shadow: 0 10px 60px rgba(255, 107, 53, 0.8); }
        }

        .notification-title {
            font-size: 1.5rem;
            color: #8b4513;
            margin-bottom: 20px;
        }

        .notification-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .notification-badge-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .notification-badge-name.common { color: #d4af37; }
        .notification-badge-name.rare { color: #9c27b0; }
        .notification-badge-name.epic { color: #ff6b35; }

        .notification-badge-desc {
            color: #666;
            margin-bottom: 20px;
        }

        .notification-close {
            background: #8b4513;
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .notification-close:hover {
            background: #a0522d;
            transform: scale(1.05);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: particleFloat 2s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0);
            }
        }

        @media (max-width: 600px) {
            .page-title {
                font-size: 1.8rem;
            }
            
            .badge-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .badge-icon {
                width: 60px;
                height: 60px;
            }
            
            .stats-summary {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

        const RARITY_NAMES = {
            common: '普通',
            rare: '稀有',
            epic: '史诗'
        };

        const BadgeManager = {
            STORAGE_KEY: 'badge_data_v1',
            QUIZ_COUNT_KEY: 'quiz_total_count_v1',
            HISTORY_KEY: 'quiz_history_v1',
            
            getData() {
                try {
                    const data = localStorage.getItem(this.STORAGE_KEY);
                    return data ? JSON.parse(data) : {
                        unlockedBadges: [],
                        badgeUnlockTime: {},
                        readingProgress: {
                            xiyou: { stage1: false, stage2: false, stage3: false },
                            sanguo: { stage1: false, stage2: false, stage3: false },
                            shuihu: { stage1: false, stage2: false, stage3: false },
                            honglou: { stage1: false, stage2: false, stage3: false }
                        }
                    };
                } catch (e) {
                    return {
                        unlockedBadges: [],
                        badgeUnlockTime: {},
                        readingProgress: {
                            xiyou: { stage1: false, stage2: false, stage3: false },
                            sanguo: { stage1: false, stage2: false, stage3: false },
                            shuihu: { stage1: false, stage2: false, stage3: false },
                            honglou: { stage1: false, stage2: false, stage3: false }
                        }
                    };
                }
            },
            
            saveData(data) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.error('保存勋章数据失败:', e);
                }
            },
            
            getTotalQuizCount() {
                const history = this.getHistoryData();
                let total = 0;
                Object.values(history).forEach(item => {
                    total += item.totalAttempts || 0;
                });
                return total;
            },
            
            getHistoryData() {
                try {
                    const data = localStorage.getItem(this.HISTORY_KEY);
                    return data ? JSON.parse(data) : {};
                } catch (e) {
                    return {};
                }
            },
            
            getReadingProgress(book) {
                const data = this.getData();
                return data.readingProgress[book] || { stage1: false, stage2: false, stage3: false };
            },
            
            isBookCompleted(book) {
                const progress = this.getReadingProgress(book);
                return progress.stage1 && progress.stage2 && progress.stage3;
            },
            
            getCompletedBooksCount() {
                let count = 0;
                ['xiyou', 'sanguo', 'shuihu', 'honglou'].forEach(book => {
                    if (this.isBookCompleted(book)) count++;
                });
                return count;
            },
            
            markStageRead(book, stage) {
                const data = this.getData();
                if (!data.readingProgress[book]) {
                    data.readingProgress[book] = { stage1: false, stage2: false, stage3: false };
                }
                data.readingProgress[book]['stage' + stage] = true;
                this.saveData(data);
                
                return this.checkAndUnlockBadges();
            },
            
            getBadgeProgress(badge) {
                if (badge.type === 'quiz') {
                    const current = this.getTotalQuizCount();
                    return {
                        current: Math.min(current, badge.target),
                        target: badge.target,
                        percent: Math.min(100, Math.round((current / badge.target) * 100))
                    };
                } else if (badge.type === 'reading') {
                    if (badge.book === 'all') {
                        const completed = this.getCompletedBooksCount();
                        return {
                            current: completed,
                            target: 4,
                            percent: Math.round((completed / 4) * 100)
                        };
                    } else {
                        const progress = this.getReadingProgress(badge.book);
                        const completed = (progress.stage1 ? 1 : 0) + (progress.stage2 ? 1 : 0) + (progress.stage3 ? 1 : 0);
                        return {
                            current: completed,
                            target: 3,
                            percent: Math.round((completed / 3) * 100)
                        };
                    }
                } else if (badge.type === 'mastery') {
                    const mastery = this.getCategoryMastery(badge.category);
                    return {
                        current: Math.round(mastery * 100),
                        target: 80,
                        percent: Math.min(100, Math.round(mastery * 100 / 80 * 100))
                    };
                } else if (badge.type === 'leaderboard') {
                    const rankData = this.getLeaderboardRank();
                    const targetRank = badge.targetRank || badge.targetAll || 1;
                    const currentRank = rankData.rank;
                    if (badge.targetAll) {
                        const inTop = (rankData.rank <= targetRank ? 1 : 0) + 
                            (rankData.time <= targetRank ? 1 : 0) + 
                            (rankData.accuracy <= targetRank ? 1 : 0);
                        return {
                            current: inTop,
                            target: 3,
                            percent: Math.round((inTop / 3) * 100)
                        };
                    }
                    return {
                        current: currentRank <= targetRank ? targetRank : '未上榜',
                        target: '前' + targetRank + '名',
                        percent: currentRank <= targetRank ? 100 : 0
                    };
                }
                return { current: 0, target: 1, percent: 0 };
            },
            
            getCategoryMastery(category) {
                try {
                    const statsData = localStorage.getItem('category_stats_v1');
                    if (statsData) {
                        const stats = JSON.parse(statsData);
                        if (stats[category] && stats[category].total > 0) {
                            return stats[category].correct / stats[category].total;
                        }
                    }
                    const data = localStorage.getItem('category_mastery_v1');
                    if (data) {
                        const mastery = JSON.parse(data);
                        return mastery[category] || 0;
                    }
                } catch (e) {
                    console.error('获取分类掌握度失败:', e);
                }
                return 0;
            },
            
            setCategoryMastery(category, value) {
                try {
                    let mastery = {};
                    const data = localStorage.getItem('category_mastery_v1');
                    if (data) {
                        mastery = JSON.parse(data);
                    }
                    mastery[category] = value;
                    localStorage.setItem('category_mastery_v1', JSON.stringify(mastery));
                } catch (e) {
                    console.error('保存分类掌握度失败:', e);
                }
            },
            
            isBadgeUnlocked(badgeId) {
                const data = this.getData();
                return data.unlockedBadges.includes(badgeId);
            },
            
            getLeaderboardRank() {
                try {
                    const data = localStorage.getItem('leaderboard_rank_v1');
                    return data ? JSON.parse(data) : { rank: 999, time: 999, accuracy: 999 };
                } catch (e) {
                    return { rank: 999, time: 999, accuracy: 999 };
                }
            },
            
            checkAndUnlockBadges() {
                const data = this.getData();
                const newlyUnlocked = [];
                
                BADGES.forEach(badge => {
                    if (data.unlockedBadges.includes(badge.id)) return;
                    
                    let shouldUnlock = false;
                    
                    if (badge.type === 'quiz') {
                        const count = this.getTotalQuizCount();
                        shouldUnlock = count >= badge.target;
                    } else if (badge.type === 'reading') {
                        if (badge.book === 'all') {
                            shouldUnlock = this.getCompletedBooksCount() >= 4;
                        } else {
                            shouldUnlock = this.isBookCompleted(badge.book);
                        }
                    } else if (badge.type === 'mastery') {
                        const mastery = this.getCategoryMastery(badge.category);
                        shouldUnlock = mastery >= badge.target;
                    } else if (badge.type === 'leaderboard') {
                        const rankData = this.getLeaderboardRank();
                        if (badge.targetRank) {
                            shouldUnlock = rankData.rank <= badge.targetRank && rankData.rank > 0;
                        } else if (badge.targetAll) {
                            shouldUnlock = rankData.rank <= badge.targetAll && 
                                rankData.time <= badge.targetAll && 
                                rankData.accuracy <= badge.targetAll;
                        }
                    }
                    
                    if (shouldUnlock) {
                        data.unlockedBadges.push(badge.id);
                        data.badgeUnlockTime[badge.id] = Date.now();
                        newlyUnlocked.push(badge);
                    }
                });
                
                if (newlyUnlocked.length > 0) {
                    this.saveData(data);
                }
                
                return newlyUnlocked;
            },
            
            formatUnlockTime(timestamp) {
                const date = new Date(timestamp);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
        };

        function renderBadgeCard(badge) {
            try {
                const isUnlocked = BadgeManager.isBadgeUnlocked(badge.id);
                const progress = BadgeManager.getBadgeProgress(badge);
                const data = BadgeManager.getData();
                
                const lockIcon = !isUnlocked ? '<span class="lock-icon">🔒</span>' : '';
                const unlockTime = isUnlocked && data.badgeUnlockTime[badge.id] 
                    ? `<div class="unlock-time">获得于 ${BadgeManager.formatUnlockTime(data.badgeUnlockTime[badge.id])}</div>` 
                    : '';
                
                return `
                    <div class="badge-card ${badge.rarity} ${isUnlocked ? 'unlocked' : 'locked'}">
                        ${lockIcon}
                        <div class="badge-icon">${BADGE_ICONS[badge.id]}</div>
                        <div class="badge-name">${badge.name}</div>
                        <div class="badge-desc">${badge.desc}</div>
                        <span class="badge-rarity ${badge.rarity}">${RARITY_NAMES[badge.rarity]}</span>
                        <div class="progress-container">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${progress.percent}%"></div>
                            </div>
                            <div class="progress-text">${progress.current} / ${progress.target}</div>
                        </div>
                        ${unlockTime}
                    </div>
                `;
            } catch (e) {
                console.error('渲染勋章卡片失败:', badge.id, e);
                return `<div class="badge-card locked">加载失败</div>`;
            }
        }

        function renderBadges() {
            try {
                const readingBadges = BADGES.filter(b => b.type === 'reading');
                const quizBadges = BADGES.filter(b => b.type === 'quiz');
                const masteryBadges = BADGES.filter(b => b.type === 'mastery');
                const leaderboardBadges = BADGES.filter(b => b.type === 'leaderboard');
                
                document.getElementById('readingBadges').innerHTML = 
                    readingBadges.map(renderBadgeCard).join('');
                document.getElementById('quizBadges').innerHTML = 
                    quizBadges.map(renderBadgeCard).join('');
                document.getElementById('masteryBadges').innerHTML = 
                    masteryBadges.map(renderBadgeCard).join('');
                document.getElementById('leaderboardBadges').innerHTML = 
                    leaderboardBadges.map(renderBadgeCard).join('');
                
                const data = BadgeManager.getData();
                document.getElementById('unlockedCount').textContent = data.unlockedBadges.length;
                document.getElementById('totalQuestions').textContent = BadgeManager.getTotalQuizCount();
                document.getElementById('readingProgress').textContent = `${BadgeManager.getCompletedBooksCount()}/4`;
            } catch (e) {
                console.error('渲染勋章失败:', e);
            }
        }

        function showNotification(badge) {
            const overlay = document.getElementById('notificationOverlay');
            const card = document.getElementById('notificationCard');
            const icon = document.getElementById('notificationIcon');
            const name = document.getElementById('notificationBadgeName');
            const desc = document.getElementById('notificationBadgeDesc');
            
            card.className = 'notification-card ' + badge.rarity;
            icon.innerHTML = BADGE_ICONS[badge.id];
            name.textContent = badge.name;
            name.className = 'notification-badge-name ' + badge.rarity;
            desc.textContent = badge.desc;
            
            createParticles(badge.rarity);
            
            overlay.classList.add('show');
        }

        function closeNotification() {
            document.getElementById('notificationOverlay').classList.remove('show');
        }

        function createParticles(rarity) {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            
            const colors = {
                common: ['#d4af37', '#f0d78c', '#fff9e6'],
                rare: ['#9c27b0', '#ce93d8', '#f3e5f5'],
                epic: ['#ff6b35', '#f7931e', '#ffd700']
            };
            
            const particleColors = colors[rarity] || colors.common;
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '0';
                particle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                particle.style.animationDelay = Math.random() * 0.5 + 's';
                particle.style.animationDuration = (1 + Math.random()) + 's';
                container.appendChild(particle);
            }
        }

        function checkPendingNotification() {
            try {
                const pending = localStorage.getItem('pending_badge_notification');
                if (pending) {
                    localStorage.removeItem('pending_badge_notification');
                    const badge = BADGES.find(b => b.id === pending);
                    if (badge) {
                        setTimeout(() => showNotification(badge), 500);
                    }
                }
            } catch (e) {
                console.error('检查通知失败:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                renderBadges();
                checkPendingNotification();
            } catch (e) {
                console.error('初始化失败:', e);
            }
        });
    </script>
