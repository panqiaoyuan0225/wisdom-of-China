function changeTab(element, title) {
    const items = document.querySelectorAll('.nav-item');
    items.forEach(item => item.classList.remove('active'));
    element.classList.add('active');

    document.getElementById('content-title').innerText = title;
    document.getElementById('content-body').innerHTML = contentData[title];
    
    closeMobileSidebar();
}

function startXiehouyuQuiz() {
    document.getElementById('quiz-cover').style.display = 'none';
    document.getElementById('quiz-content').style.display = 'block';
    
    const quizApp = document.getElementById('quiz-app');
    if (!quizApp || quizApp.innerHTML !== "") return;
    
    XIEHOUYU_QUIZ_DATA.forEach((item, index) => {
        const qId = `q-xiehouyu-${index}`;
        const div = document.createElement('div');
        div.style.cssText = "margin-bottom:30px; padding:20px; background: rgba(255, 252, 230, 0.95); border:1px solid #d2c5a7; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);";
        
        let html = `<p style="font-size:1.1rem; font-family: 'STKaiti', 'Microsoft YaHei', serif;"><strong>第${index + 1}题：</strong>${item.q}</p>`;
        
        const opts = item.options.split('|');
        html += `<div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:15px;">`;
        opts.forEach(opt => {
            const val = opt.trim().charAt(0);
            html += `<button onclick="checkSelect(this, '${val}', '${item.a}', '${qId}')" 
                     style="padding:10px 20px; border:1px solid #8b4513; background: rgba(255, 255, 255, 0.7); cursor:pointer; border-radius:4px; transition:0.3s; font-size:1rem; font-family: 'STKaiti', 'Microsoft YaHei', serif; color: #8b4513;">
                     ${opt.trim()}
                     </button>`;
        });
        html += `</div>`;
        
        html += `<div id="feedback-${qId}" style="margin-top:15px; display:none;"></div>`;
        
        html += `<details id="note-${qId}" style="margin-top:10px; display:none;">
                    <summary style="color:#C02C3F; cursor:pointer; font-weight:bold; font-family: 'STKaiti', 'Microsoft YaHei', serif;">查看解析</summary>
                    <div style="margin-top:10px; padding:12px; background: rgba(255, 248, 230, 0.9); border-left:4px solid #C02C3F; font-size:0.9rem; font-family: 'STKaiti', 'Microsoft YaHei', serif;">
                        <strong>解析：</strong>${item.note}
                    </div>
                </details>`;
        
        div.innerHTML = html;
        quizApp.appendChild(div);
    });
}

function checkSelect(btn, userVal, correctVal, qId) {
    const feedback = document.getElementById(`feedback-${qId}`);
    const note = document.getElementById(`note-${qId}`);
    feedback.style.display = "block";
    note.style.display = "block";

    if (userVal === correctVal) {
        btn.style.background = "#dcfce7";
        btn.style.borderColor = "#16a34a";
        feedback.innerHTML = `<span style="color:#16a34a; font-weight:bold; font-family: 'STKaiti', 'Microsoft YaHei', serif;">✅ 回答正确！</span>`;
    } else {
        btn.style.background = "#fee2e2";
        btn.style.borderColor = "#ef4444";
        feedback.innerHTML = `<span style="color:#ef4444; font-weight:bold; font-family: 'STKaiti', 'Microsoft YaHei', serif;">❌ 回答错误，正确答案是 ${correctVal}</span>`;
    }
    
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.onclick = null);
}

const BadgeManager = {
    STORAGE_KEY: 'badge_data_v1',
    
    getData() {
        try {
            const data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : {
                unlockedBadges: [],
                badgeUnlockTime: {},
                readingProgress: {
                    xiyou: { stage1: false, stage2: false, stage3: false },
                    sanguo: { stage1: false, stage2: false, stage3: false },
                    shuihu: { stage1: false, stage2: false, stage3: false },
                    honglou: { stage1: false, stage2: false, stage3: false }
                }
            };
        } catch (e) {
            return {
                unlockedBadges: [],
                badgeUnlockTime: {},
                readingProgress: {
                    xiyou: { stage1: false, stage2: false, stage3: false },
                    sanguo: { stage1: false, stage2: false, stage3: false },
                    shuihu: { stage1: false, stage2: false, stage3: false },
                    honglou: { stage1: false, stage2: false, stage3: false }
                }
            };
        }
    },
    
    saveData(data) {
        try {
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
            console.error('保存勋章数据失败:', e);
        }
    },
    
    isStageRead(book, stage) {
        const data = this.getData();
        return data.readingProgress[book] && data.readingProgress[book]['stage' + stage];
    },
    
    markStageRead(book, stage) {
        const data = this.getData();
        if (!data.readingProgress[book]) {
            data.readingProgress[book] = { stage1: false, stage2: false, stage3: false };
        }
        data.readingProgress[book]['stage' + stage] = true;
        this.saveData(data);
        return this.checkAndUnlockBadges();
    },
    
    isBookCompleted(book) {
        const data = this.getData();
        const progress = data.readingProgress[book];
        return progress && progress.stage1 && progress.stage2 && progress.stage3;
    },
    
    getCompletedBooksCount() {
        let count = 0;
        ['xiyou', 'sanguo', 'shuihu', 'honglou'].forEach(book => {
            if (this.isBookCompleted(book)) count++;
        });
        return count;
    },
    
    checkAndUnlockBadges() {
        const data = this.getData();
        const newlyUnlocked = [];
        
        const bookBadges = [
            { id: 'xiyou_reader', name: '西游行者', desc: '完成西游记阅读', book: 'xiyou' },
            { id: 'sanguo_reader', name: '三国通览', desc: '完成三国演义阅读', book: 'sanguo' },
            { id: 'shuihu_reader', name: '水浒知音', desc: '完成水浒传阅读', book: 'shuihu' },
            { id: 'honglou_reader', name: '红楼初探', desc: '完成红楼梦阅读', book: 'honglou' },
            { id: 'all_books_reader', name: '四大名著通', desc: '完成全部名著阅读', book: 'all' }
        ];
        
        bookBadges.forEach(badge => {
            if (data.unlockedBadges.includes(badge.id)) return;
            
            let shouldUnlock = false;
            if (badge.book === 'all') {
                shouldUnlock = this.getCompletedBooksCount() >= 4;
            } else {
                shouldUnlock = this.isBookCompleted(badge.book);
            }
            
            if (shouldUnlock) {
                data.unlockedBadges.push(badge.id);
                data.badgeUnlockTime[badge.id] = Date.now();
                newlyUnlocked.push(badge);
            }
        });
        
        if (newlyUnlocked.length > 0) {
            this.saveData(data);
        }
        
        return newlyUnlocked;
    }
};

function showBadgeNotification(badge) {
    document.getElementById('badgeName').textContent = badge.name;
    document.getElementById('badgeDesc').textContent = badge.desc;
    
    const card = document.getElementById('badgeCard');
    const rarityColors = {
        common: '#d4af37',
        rare: '#9c27b0',
        epic: '#ff6b35'
    };
    const color = rarityColors[badge.rarity] || rarityColors.common;
    card.style.border = '4px solid ' + color;
    card.style.boxShadow = '0 10px 40px ' + color + '80';
    document.getElementById('badgeName').style.color = color;
    
    document.getElementById('badgeNotification').classList.add('show');
}

function closeBadgeNotification() {
    document.getElementById('badgeNotification').classList.remove('show');
}

let autoReadStartTime = Date.now();
let hasScrolledEnough = false;
const MIN_READ_TIME = 30000;
const SCROLL_THRESHOLD = 0.8;
let autoReadMarked = false;

function initAutoReadTracking() {
    if (BadgeManager.isStageRead('xiyou', 2)) {
        autoReadMarked = true;
        return;
    }
    
    const mainContent = document.querySelector('.main-content');
    
    mainContent.addEventListener('scroll', function() {
        if (autoReadMarked) return;
        
        const scrollPercent = (mainContent.scrollTop + mainContent.clientHeight) / mainContent.scrollHeight;
        if (scrollPercent >= SCROLL_THRESHOLD) {
            hasScrolledEnough = true;
            checkAndMarkAutoRead();
        }
    });
    
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && !autoReadMarked) {
            checkAndMarkAutoRead();
        }
    });
    
    window.addEventListener('beforeunload', function() {
        if (!autoReadMarked) {
            checkAndMarkAutoRead();
        }
    });
}

function checkAndMarkAutoRead() {
    if (autoReadMarked) return;
    
    const readTime = Date.now() - autoReadStartTime;
    if (readTime >= MIN_READ_TIME && hasScrolledEnough) {
        const newlyUnlocked = BadgeManager.markStageRead('xiyou', 2);
        autoReadMarked = true;
        
        if (newlyUnlocked.length > 0) {
            localStorage.setItem('pending_badge_notification', newlyUnlocked[0].id);
        }
    }
}

window.addEventListener('load', function() {
    initAutoReadTracking();
});
