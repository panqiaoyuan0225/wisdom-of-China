'拾陆 · 楚州毒酒': `
        
        <h2 style="color:#8b1a1a; font-size: 26px; border-bottom: 2px solid #8b1a1a; padding-bottom:10px; margin-top: 0;">🍷 专题拾陆 · 楚州毒酒</h2>
        
        <h3 style="font-size: 20px; color: #8b1a1a; margin-top: 25px;">一、背景：功高震主与奸臣未除</h3>
        <p><b>宋江的“圆满”假象：</b>平定方腊后，宋江受封楚州安抚使兼兵马都总管，表面上实现了“封妻荫子、青史留名”的理想，在楚州履职“惜军爱民，百姓敬之如父母”。</p>
        <p><b>奸臣的刻骨仇恨：</b>高俅、杨戬、蔡京等权奸，对梁山的仇恨从未消解。他们深知宋江“仁德忠义”，深得军心民心，且麾下仍有李逵等猛将，卧榻之侧，岂容他人安睡？ 必欲除之而后快。</p>
        <p><b>皇帝的软弱与默许：</b>宋徽宗虽对宋江有所赞赏，但其昏聩软弱，朝政被奸臣把持。他对除掉宋江一事，即便不知具体阴谋，也处在一种放任与默许的状态。</p>

        <hr style="border-top: 1px dashed #a6937c; margin: 25px 0;">

        <h3 style="font-size: 20px; color: #8b1a1a;">二、毒计施行：一场针对“忠义”的精密谋杀</h3>
        <p><b>密谋定策：</b>高、杨二奸臣于枢密院密议，认定宋江不死，“后患无穷”。他们利用职权，选定最阴险的方式——御赐毒酒，以“皇恩”之名行谋杀之实。</p>
        <p><b>使者下毒：</b>二奸派心腹使者，赍“御酒”前往楚州。酒中已下水银慢毒（一种发作较慢的剧毒，符合“天使赐酒，饮后谢恩”的流程，避免当场暴毙引发事变）。</p>
        <p><b>宋江饮鸩：</b>宋江毫无防备，恭迎天使，焚香沐浴，望阙谢恩，将毒酒一饮而尽。这一系列动作充满仪式感，也充满讽刺——他以最虔诚的“忠君”礼仪，迎接了自己的死亡判决。</p>

        <hr style="border-top: 1px dashed #a6937c; margin: 25px 0;">

        <h3 style="font-size: 20px; color: #8b1a1a;">三、事件核心：识破真相后的抉择与连锁悲剧</h3>
        <p>这才是事件最残酷、最具悲剧张力的部分：宋江并非无知无觉地死去，而是在毒发前知晓了真相，并做出了令人心寒的选择。</p>
        
        <p><b>毒发与知情：</b>饮鸩数日后，宋江觉腹疼体沉，渐知是中毒。恰逢李逵自润州任上前来探视，宋江在对话中更确信酒中有毒，且此乃朝廷之意。</p>
        
        <p><b>宋江的终极抉择——“我死不争，只有李逵……”</b></p>
        <ul>
            <li><b>心理活动：</b>宋江自知必死，但他最恐惧的不是个人身死，而是李逵闻讯后必然哨聚山林，再造反叛，这会毁掉自己毕生经营的“忠义”之名，使梁山事业蒙上“叛臣”的污点。</li>
            <li><b>惊人之举：</b>宋江唤来李逵，不仅告知自己中毒将亡，更在接风酒中也给李逵下了慢药。</li>
        </ul>

        <p><b>临终对话（灵魂拷问）：</b></p>
        <blockquote style="margin: 20px 0; padding: 15px; background: #fffcf0; border-left: 5px solid #d4af37; font-style: italic;">
            宋江道：“兄弟，你休怪我！前日朝廷差天使，赐药酒与我服了，死在旦夕。我为人一世，只主张‘忠义’二字，不肯半点欺心。今日朝廷赐死无辜，宁可朝廷负我，我忠心不负朝廷。我死之后，恐怕你造反，坏了我梁山泊替天行道忠义之名。因此，请将你来，相见一面。昨日酒中，已与了你慢药服了，回至润州必死。”<br>
            李逵见说，亦垂泪道：“罢，罢，罢！生时伏侍哥哥，死了也只是哥哥部下一个小鬼。”
        </blockquote>

        <p><b>李逵的回应：</b>没有愤怒，只有悲哀的认命。这头一生反抗的“黑旋风”，最终被“义兄”的“忠义”所毒杀，并自愿接受。这是对“兄弟义气”最彻底的背叛与扭曲。</p>

        <hr style="border-top: 1px dashed #a6937c; margin: 25px 0;">

        <h3 style="font-size: 20px; color: #8b1a1a;">四、事件的深层寓意与全书结局</h3>
        <table style="width:100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; background: #fffcf5; border: 1px solid #d4af37;">
            <thead>
                <tr style="background:#8b1a1a; color:#ffffff;">
                    <th style="padding:10px; border:1px solid #8b1a1a; width:30%;">核心要素</th>
                    <th style="padding:10px; border:1px solid #8b1a1a;">悲剧呈现</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="padding:10px; border:1px solid #d4af37; font-weight:bold;">死亡方式</td>
                    <td style="padding:10px; border:1px solid #d4af37;"><b>宋江：</b>谢恩饮鸩（仪式化的自毁）。<br><b>李逵：</b>兄赐弟死（义气被忠君绑架）。</td>
                </tr>
                <tr>
                    <td style="padding:10px; border:1px solid #d4af37; font-weight:bold;">朝廷态度</td>
                    <td style="padding:10px; border:1px solid #d4af37;"><b>生前：</b>借刀杀人（利用后除掉）。<br><b>死后：</b>立庙追封（廉价的道德补偿）。</td>
                </tr>
                <tr>
                    <td style="padding:10px; border:1px solid #d4af37; font-weight:bold;">神话闭环</td>
                    <td style="padding:10px; border:1px solid #d4af37;">从“误走妖魔”到“星魂归位”，现实幻灭后归于鬼神传说。</td>
                </tr>
            </tbody>
        </table>

        <p>1. <b>“忠义”的彻底异化与吃人本质：</b>宋江临死前，用“忠义”之名毒杀了最忠心的兄弟李逵。“义”在这里，成了实践“忠”的工具和祭品。宋江的“忠”，已异化为对抽象皇权符号的迷信，超越了具体兄弟的生命。</p>
        <p>2. <b>体制对理想主义者的终极消化：</b>朝廷（奸臣代表）用一杯毒酒，完成了对梁山反抗力量的最终清除。招安不是接纳，而是消化和排泄。宋江的悲剧在于，他主动进入这个消化系统，并最终成为了系统排出的残渣。</p>
        <p>3. <b>全书结构的闭环与升华：</b>起点与终点从“洪太尉误走妖魔”，到“宋公明神聚”，完成了一个 “出世→聚义→招安→毁灭→归位” 的神话循环。</p>

// 2. 开始测验：切换显示状态并渲染题目
function startQuiz() {
    const cover = document.getElementById('quiz-cover');
    const content = document.getElementById('quiz-content');
    
    if (cover) cover.style.display = 'none';
    if (content) content.style.display = 'block';
    
    renderQuestions(); 
}

// 3. 核心渲染函数：按题型分区生成 HTML
function renderQuestions() {
    const container = document.getElementById('quiz-app');
    const questions = GLOBAL_QUIZ_DATA;
if (!container) {
        console.error("找不到 quiz-app 容器！");
        return;
    }
    container.innerHTML = ""; // 强制清空再渲染，确保不会空白
    const sections = [
        { title: '第一部分：选择题', type: '选择' },
        { title: '第二部分：填空题', type: '填空' },
        { title: '第三部分：简答题', type: '简答' }
    ];

    sections.forEach(sec => {
        const filtered = questions.filter(item => item.type === sec.type);
        if (filtered.length > 0) {
            // 渲染分区标题
            const header = document.createElement('h2');
            header.style.cssText = "color:#8b1a1a; border-bottom:2px solid #8b1a1a; margin-top:40px; padding-bottom:10px;";
            header.innerText = sec.title;
            container.appendChild(header);

            filtered.forEach((item, idx) => {
                const qId = `q-${sec.type}-${idx}`; // 生成唯一ID
                const div = document.createElement('div');
                div.style.cssText = "margin-bottom:30px; padding:20px; background:#fff; border:1px solid #eee; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);";

                let html = `<p style="font-size:1.1rem;"><strong>${idx + 1}.</strong> ${item.q}</p>`;

                // --- 分支：选择题 ---
                if (item.type === '选择') {
                    const opts = item.options.split('|');
                    html += `<div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:15px;">`;
                    opts.forEach(opt => {
                        const val = opt.trim().charAt(0); // 获取 A, B, C, D
                        html += `<button onclick="checkSelect(this, '${val}', '${item.a}', '${qId}')" 
                                 style="padding:8px 20px; border:1px solid #ccc; background:#fff; cursor:pointer; border-radius:4px; transition:0.3s;">
                                 ${opt.trim()}
                                 </button>`;
                    });
                    html += `</div>`;
                } 
                // --- 分支：填空题 ---
                else if (item.type === '填空') {
                    html += `<div style="margin-top:15px;">
                                <input type="text" id="input-${qId}" placeholder="在此输入答案..." 
                                 style="padding:10px; width:250px; border:1px solid #ccc; border-radius:4px;">
                                <button onclick="checkFill('${qId}', '${item.a}')" 
                                 style="padding:10px 20px; background:#8b1a1a; color:white; border:none; border-radius:4px; margin-left:10px; cursor:pointer;">提交</button>
                             </div>`;
                }
                // --- 分支：简答题 ---
                else {
                    html += `<div style="margin-top:15px;">
                                <textarea id="input-${qId}" placeholder="请阐述你的见解..." 
                                 style="padding:10px; width:100%; height:80px; border:1px solid #ccc; border-radius:4px;"></textarea>
                                <button onclick="checkBrief('${qId}')" 
                                 style="padding:10px 20px; background:#333; color:white; border:none; border-radius:4px; margin-top:10px; cursor:pointer;">完成思考</button>
                             </div>`;
                }

                // 反馈区域与解析区域（默认隐藏）
                html += `
                    <div id="feedback-${qId}" style="margin-top:15px; display:none;"></div>
                    <details id="note-${qId}" style="margin-top:10px; display:none;">
                        <summary style="color:#8b1a1a; cursor:pointer; font-weight:bold;">查看解析</summary>
                        <div style="margin-top:10px; padding:12px; background:#f9f9f9; border-left:4px solid #8b1a1a; font-size:0.9rem;">
                            <strong>解析：</strong>${item.note}
                        </div>
                    </details>`;

                div.innerHTML = html;
                container.appendChild(div);
            });
        }
    });
}

// 4. 判分逻辑函数
function checkSelect(btn, userVal, correctVal, qId) {
    const feedback = document.getElementById(`feedback-${qId}`);
    const note = document.getElementById(`note-${qId}`);
    feedback.style.display = "block";
    note.style.display = "block";

    if (userVal === correctVal) {
        btn.style.background = "#dcfce7";
        btn.style.borderColor = "#16a34a";
        feedback.innerHTML = `<span style="color:#16a34a; font-weight:bold;">✅ 回答正确！</span>`;
    } else {
        btn.style.background = "#fee2e2";
        btn.style.borderColor = "#ef4444";
        feedback.innerHTML = `<span style="color:#ef4444; font-weight:bold;">❌ 回答错误，正确答案是 ${correctVal}</span>`;
    }
    // 禁用该题按钮
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.onclick = null);
}

function checkFill(qId, correctVal) {
    const input = document.getElementById(`input-${qId}`);
    const feedback = document.getElementById(`feedback-${qId}`);
    const note = document.getElementById(`note-${qId}`);
    feedback.style.display = "block";
    note.style.display = "block";

    if (input.value.trim().toLowerCase() === correctVal.toLowerCase()) {
        feedback.innerHTML = `<span style="color:#16a34a; font-weight:bold;">✅ 恭喜，完全正确！</span>`;
        input.style.borderColor = "#16a34a";
    } else {
        feedback.innerHTML = `<span style="color:#ef4444; font-weight:bold;">❌ 正确答案是：${correctVal}</span>`;
        input.style.borderColor = "#ef4444";
    }
}

function checkBrief(qId) {
    const feedback = document.getElementById(`feedback-${qId}`);
    const note = document.getElementById(`note-${qId}`);
    feedback.style.display = "block";
    note.style.display = "block";
    feedback.innerHTML = `<span style="color:#333; font-weight:bold;">💡 已记录你的思考。请对照解析自我核对：</span>`;
}
    function changeTab(element, title) {
        const items = document.querySelectorAll('.nav-item');
        items.forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        
        document.getElementById('content-title').innerText = title;
        const body = document.getElementById('content-body');
        if (contentData[title]) {
            body.innerHTML = contentData[title];
        }
        
        closeMobileSidebar();
    }

    // 初始化显示
    window.onload = () => {
        const first = document.querySelector('.nav-item');
        if(first) changeTab(first, '拾叁 · 血染征袍');
    };

    const BadgeManager = {
        STORAGE_KEY: 'badge_data_v1',
        
        getData() {
            try {
                const data = localStorage.getItem(this.STORAGE_KEY);
                return data ? JSON.parse(data) : {
                    unlockedBadges: [],
                    badgeUnlockTime: {},
                    readingProgress: {
                        xiyou: { stage1: false, stage2: false, stage3: false },
                        sanguo: { stage1: false, stage2: false, stage3: false },
                        shuihu: { stage1: false, stage2: false, stage3: false },
                        honglou: { stage1: false, stage2: false, stage3: false }
                    }
                };
            } catch (e) {
                return {
                    unlockedBadges: [],
                    badgeUnlockTime: {},
                    readingProgress: {
                        xiyou: { stage1: false, stage2: false, stage3: false },
                        sanguo: { stage1: false, stage2: false, stage3: false },
                        shuihu: { stage1: false, stage2: false, stage3: false },
                        honglou: { stage1: false, stage2: false, stage3: false }
                    }
                };
            }
        },
        
        saveData(data) {
            try {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('保存勋章数据失败:', e);
            }
        },
        
        isStageRead(book, stage) {
            const data = this.getData();
            return data.readingProgress[book] && data.readingProgress[book]['stage' + stage];
        },
        
        markStageRead(book, stage) {
            const data = this.getData();
            if (!data.readingProgress[book]) {
                data.readingProgress[book] = { stage1: false, stage2: false, stage3: false };
            }
            data.readingProgress[book]['stage' + stage] = true;
            this.saveData(data);
            return this.checkAndUnlockBadges();
        },
        
        isBookCompleted(book) {
            const data = this.getData();
            const progress = data.readingProgress[book];
            return progress && progress.stage1 && progress.stage2 && progress.stage3;
        },
        
        getCompletedBooksCount() {
            let count = 0;
            ['xiyou', 'sanguo', 'shuihu', 'honglou'].forEach(book => {
                if (this.isBookCompleted(book)) count++;
            });
            return count;
        },
        
        checkAndUnlockBadges() {
            const data = this.getData();
            const newlyUnlocked = [];
            
            const bookBadges = [
                { id: 'xiyou_reader', name: '西游行者', desc: '完成西游记阅读', book: 'xiyou' },
                { id: 'sanguo_reader', name: '三国通览', desc: '完成三国演义阅读', book: 'sanguo' },
                { id: 'shuihu_reader', name: '水浒知音', desc: '完成水浒传阅读', book: 'shuihu' },
                { id: 'honglou_reader', name: '红楼初探', desc: '完成红楼梦阅读', book: 'honglou' },
                { id: 'all_books_reader', name: '四大名著通', desc: '完成全部名著阅读', book: 'all' }
            ];
            
            bookBadges.forEach(badge => {
                if (data.unlockedBadges.includes(badge.id)) return;
                
                let shouldUnlock = false;
                if (badge.book === 'all') {
                    shouldUnlock = this.getCompletedBooksCount() >= 4;
                } else {
                    shouldUnlock = this.isBookCompleted(badge.book);
                }
                
                if (shouldUnlock) {
                    data.unlockedBadges.push(badge.id);
                    data.badgeUnlockTime[badge.id] = Date.now();
                    newlyUnlocked.push(badge);
                }
            });
            
            if (newlyUnlocked.length > 0) {
                this.saveData(data);
            }
            
            return newlyUnlocked;
        }
    };

    let autoReadStartTime = Date.now();
    let hasScrolledEnough = false;
    const MIN_READ_TIME = 30000;
    const SCROLL_THRESHOLD = 0.8;
    let autoReadMarked = false;

    function initAutoReadTracking() {
        if (BadgeManager.isStageRead('shuihu', 3)) {
            autoReadMarked = true;
            return;
        }
        
        const mainContent = document.querySelector('.main-content');
        
        mainContent.addEventListener('scroll', function() {
            if (autoReadMarked) return;
            
            const scrollPercent = (mainContent.scrollTop + mainContent.clientHeight) / mainContent.scrollHeight;
            if (scrollPercent >= SCROLL_THRESHOLD) {
                hasScrolledEnough = true;
                checkAndMarkAutoRead();
            }
        });
        
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && !autoReadMarked) {
                checkAndMarkAutoRead();
            }
        });
        
        window.addEventListener('beforeunload', function() {
            if (!autoReadMarked) {
                checkAndMarkAutoRead();
            }
        });
    }

    function checkAndMarkAutoRead() {
        if (autoReadMarked) return;
        
        const readTime = Date.now() - autoReadStartTime;
        if (readTime >= MIN_READ_TIME && hasScrolledEnough) {
            const newlyUnlocked = BadgeManager.markStageRead('shuihu', 3);
            autoReadMarked = true;
            
            if (newlyUnlocked.length > 0) {
                localStorage.setItem('pending_badge_notification', newlyUnlocked[0].id);
            }
        }
    }

    function showBadgeNotification(badge) {
        document.getElementById('badgeName').textContent = badge.name;
        document.getElementById('badgeDesc').textContent = badge.desc;
        
        const card = document.getElementById('badgeCard');
        const rarityColors = {
            common: '#d4af37',
            rare: '#9c27b0',
            epic: '#ff6b35'
        };
        const color = rarityColors[badge.rarity] || rarityColors.common;
        card.style.border = '4px solid ' + color;
        card.style.boxShadow = '0 10px 40px ' + color + '80';
        document.getElementById('badgeName').style.color = color;
        
        document.getElementById('badgeNotification').classList.add('show');
    }

    function closeBadgeNotification() {
        document.getElementById('badgeNotification').classList.remove('show');
    }

    window.addEventListener('load', function() {
        initAutoReadTracking();
    });
</script>
</body>
</html>
