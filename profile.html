<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人档案</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            padding: 20px;
            padding-top: 60px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 40px;
            text-decoration: none;
            color: #f0e68c;
            font-weight: bold;
            background: #8b4513;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .page-title {
            text-align: center;
            color: #8b4513;
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .profile-header {
            max-width: 800px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fff9e6, #fff5d6);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border: 3px solid #d4af37;
        }

        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #d4af37;
            object-fit: cover;
            background: #e8e0c0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #8b4513;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        /* --- 优化后的：头像框-书卷 (frame_scroll) --- */
        .avatar.frame_scroll {
            position: relative;
            border: 4px solid #8b4513; /* 木质色深色边 */
            box-shadow: 
                0 0 0 2px #d2691e, /* 外圈浅木色 */
                0 0 15px rgba(139, 69, 19, 0.4), /* 扩散阴影 */
                inset 0 0 10px rgba(0,0,0,0.1);
            background: #fff9e6; /* 古典纸张色背景 */
            animation: scrollBreathe 3s ease-in-out infinite;
        }
        
        .avatar.frame_scroll::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            clip-path: polygon(0 0, 30% 0, 30% 100%, 0 100%, 0 0, 70% 0, 70% 100%, 100% 100%, 100% 0, 70% 0); /* 模拟画轴两端 */
            opacity: 0.6;
        }

        .avatar.frame_scroll::after {
            content: '✒️'; 
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 18px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes scrollBreathe {
            0%, 100% { box-shadow: 0 0 10px rgba(139, 69, 19, 0.3), inset 0 0 5px rgba(0,0,0,0.1); }
            50% { box-shadow: 0 0 20px rgba(139, 69, 19, 0.6), inset 0 0 8px rgba(0,0,0,0.15); }
        }

        /* --- 优化后的：头像框-梅花 (frame_plum) --- */
        .avatar.frame_plum {
            position: relative;
            border: 4px solid #ffb7c5;
            box-shadow: 
                0 0 0 2px #ff69b4,
                0 0 20px rgba(255, 182, 193, 0.5);
            animation: plumGlow 4s ease-in-out infinite;
        }
        
        /* 模拟飘落的花瓣粒子 */
        .avatar.frame_plum::before {
            content: '🌸';
            position: absolute;
            font-size: 10px;
            top: -10px;
            left: 20%;
            opacity: 0;
            animation: petalRain 5s linear infinite;
        }
        
        .avatar.frame_plum::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 2px dashed #ffb7c5;
            border-radius: 50%;
            opacity: 0.3;
            animation: rotateFrame 10s linear infinite;
        }

        @keyframes plumGlow {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
        }

        @keyframes petalRain {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(130px) rotate(360deg); opacity: 0; }
        }

        @keyframes rotateFrame {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .username.glow-effect {
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700, #FFA500);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 2s linear infinite;
            font-weight: bold;
            display: inline-block;
            position: relative;
        }
        
        .username.glow-effect::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700, #FFA500);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 2s linear infinite;
            filter: blur(8px);
            opacity: 0.7;
            z-index: -1;
        }

        @keyframes textShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-upload-hint {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #8b4513;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #d4af37;
        }

        .avatar-input {
            display: none;
        }

        .user-info {
            flex: 1;
        }

        .username-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .username {
            font-size: 1.8rem;
            font-weight: bold;
            color: #8b4513;
            position: relative;
        }

        .user-rank {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .rank-icon-small {
            width: 40px;
            height: 40px;
        }

        .rank-name-text {
            font-size: 1.1rem;
            color: #666;
        }

        .stats-grid {
            max-width: 800px;
            margin: 0 auto 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #8b4513;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .section {
            max-width: 800px;
            margin: 0 auto 30px;
        }

        .section-title {
            color: #8b4513;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-showcase {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .badge-item {
            width: 90px;
            text-align: center;
            transition: transform 0.3s;
        }

        .badge-item:hover {
            transform: scale(1.1);
        }

        .badge-icon-small {
            width: 70px;
            height: 70px;
            margin: 0 auto 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .badge-icon-small::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #f0d78c, #d4af37);
            opacity: 0.3;
            z-index: -1;
        }

        .badge-icon-small img {
            width: 62px;
            height: 62px;
            object-fit: contain;
            border-radius: 50%;
            border: 3px solid #d4af37;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2), inset 0 2px 8px rgba(255,255,255,0.5);
            background: linear-gradient(135deg, #fff9e6, #f5f5dc, #fff9e6);
            padding: 4px;
        }

        .badge-item.rare .badge-icon-small img {
            border-color: #9c27b0;
            box-shadow: 0 3px 10px rgba(156,39,176,0.35), inset 0 2px 8px rgba(255,255,255,0.5);
        }

        .badge-item.rare .badge-icon-small::before {
            background: linear-gradient(135deg, #9c27b0, #ce93d8, #9c27b0);
        }

        .badge-item.epic .badge-icon-small img {
            border-color: #ff6b35;
            box-shadow: 0 3px 12px rgba(255,107,53,0.45), inset 0 2px 8px rgba(255,255,255,0.5);
        }

        .badge-item.epic .badge-icon-small::before {
            background: linear-gradient(135deg, #ff6b35, #f7931e, #ff6b35);
        }

        .badge-name-small {
            font-size: 0.75rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-badges {
            color: #999;
            text-align: center;
            padding: 20px;
        }

        .reading-progress {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .book-progress-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .book-progress-item:last-child {
            border-bottom: none;
        }

        .book-icon {
            font-size: 2rem;
        }

        .book-info {
            flex: 1;
        }

        .book-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #d4af37, #f0d78c);
            transition: width 0.5s ease;
        }

        .book-status {
            font-size: 0.85rem;
            color: #666;
            min-width: 60px;
            text-align: right;
        }

        .appearance-section {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .appearance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .appearance-item:last-child {
            border-bottom: none;
        }

        .appearance-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .appearance-icon {
            font-size: 1.5rem;
        }

        .appearance-name {
            font-weight: bold;
            color: #333;
        }

        .appearance-status {
            font-size: 0.9rem;
            padding: 5px 15px;
            border-radius: 15px;
        }

        .appearance-status.owned {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .appearance-status.active {
            background: #fff3e0;
            color: #e65100;
        }

        .appearance-status.not-owned {
            background: #f5f5f5;
            color: #999;
        }

        .appearance-use-btn {
            padding: 5px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 15px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .appearance-use-btn:hover {
            background: #45a049;
        }

        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .username {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
        }
    </style>
    <script src="guest-access-check.js"></script>
</head>
<body>
    <a href="home.html" class="back-link">← 返回主页</a>
    
    <h1 class="page-title">个人档案</h1>
    
    <div class="profile-header">
        <div class="avatar-container">
            <div class="avatar" id="avatar" onclick="document.getElementById('avatarInput').click()">

        </div>
        <div class="user-info">
            <div class="username-container">

            <div class="user-rank">

                <span class="rank-name-text" id="rankName">加载中...</span>

        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-coins" style="color: #fbbf24;"></i></div>
            <div class="stat-value" id="totalPoints">0</div>
            <div class="stat-label">当前书卷</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-pen-to-square" style="color: #3b82f6;"></i></div>
            <div class="stat-value" id="totalQuestions">0</div>
            <div class="stat-label">累计答题</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-circle-check" style="color: #22c55e;"></i></div>
            <div class="stat-value" id="accuracy">0%</div>
            <div class="stat-label">正确率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-medal" style="color: #f59e0b;"></i></div>
            <div class="stat-value" id="badgeCount">0</div>
            <div class="stat-label">获得勋章</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-book-bookmark" style="color: #8b4513;"></i></div>
            <div class="stat-value" id="booksCompleted">0/4</div>
            <div class="stat-label">名著阅读</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fa-solid fa-clock" style="color: #6b7280;"></i></div>
            <div class="stat-value" id="totalTime">0分钟</div>
            <div class="stat-label">浏览时长</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title"><i class="fa-solid fa-medal" style="color: #f59e0b;"></i> 我的勋章</h2>
        <div class="badge-showcase">
            <div class="badge-list" id="badgeList">
                <div class="no-badges">暂无勋章，继续努力吧！</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title"><i class="fa-solid fa-book-open" style="color: #8b4513;"></i> 名著阅读进度</h2>
        <div class="reading-progress">
            <div class="book-progress-item">
                <span class="book-icon"><i class="fa-solid fa-book" style="color: #dc2626;"></i></span>
                <div class="book-info">
                    <div class="book-name">红楼梦</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="honglouProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="honglouStatus">未开始</span>
            </div>
            <div class="book-progress-item">
                <span class="book-icon"><i class="fa-solid fa-book" style="color: #2563eb;"></i></span>
                <div class="book-info">
                    <div class="book-name">三国演义</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="sanguoProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="sanguoStatus">未开始</span>
            </div>
            <div class="book-progress-item">
                <span class="book-icon"><i class="fa-solid fa-book" style="color: #d97706;"></i></span>
                <div class="book-info">
                    <div class="book-name">水浒传</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="shuihuProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="shuihuStatus">未开始</span>
            </div>
            <div class="book-progress-item">
                <span class="book-icon"><i class="fa-solid fa-book" style="color: #16a34a;"></i></span>
                <div class="book-info">
                    <div class="book-name">西游记</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="xiyouProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="xiyouStatus">未开始</span>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title"><i class="fa-solid fa-palette" style="color: #a855f7;"></i> 外观道具</h2>
        <div class="appearance-section">
            <div class="appearance-item">
                <div class="appearance-info">
                    <span class="appearance-icon"><i class="fa-solid fa-scroll" style="color: #8b4513;"></i></span>
                    <span class="appearance-name">头像框-书卷</span>
                </div>
                <div class="appearance-status" id="frame_scroll_status">未拥有</div>
            </div>
            <div class="appearance-item">
                <div class="appearance-info">
                    <span class="appearance-icon"><i class="fa-solid fa-spa" style="color: #ec4899;"></i></span>
                    <span class="appearance-name">头像框-梅花</span>
                </div>
                <div class="appearance-status" id="frame_plum_status">未拥有</div>
            </div>
            <div class="appearance-item">
                <div class="appearance-info">
                    <span class="appearance-icon"><i class="fa-solid fa-wand-magic-sparkles" style="color: #a855f7;"></i></span>
                    <span class="appearance-name">昵称特效</span>
                </div>
                <div class="appearance-status" id="nickname_glow_status">未拥有</div>
            </div>
        </div>
    </div>

    <script>
        const PointsManager = {
            STORAGE_KEY: 'user_points_v1',
            
            getData() {
                try {
                    let data = localStorage.getItem(this.STORAGE_KEY);
                    
                    if (!data) {
                        return this.getDefaultData();
                    }
                    
                    let parsedData = JSON.parse(data);
                    let needSave = false;
                    
                    // 确保 ownedAppearance 数组存在
                    if (!parsedData.ownedAppearance) {
                        parsedData.ownedAppearance = [];
                        needSave = true;
                    }
                    
                    // 迁移旧数据：从 ownedItems 迁移到 ownedAppearance
                    const appearanceItems = ['frame_scroll', 'frame_plum', 'nickname_glow'];
                    
                    if (parsedData.ownedItems) {
                        appearanceItems.forEach(itemId => {
                            if (parsedData.ownedItems[itemId] && parsedData.ownedItems[itemId] > 0) {
                                if (!parsedData.ownedAppearance.includes(itemId)) {
                                    parsedData.ownedAppearance.push(itemId);
                                    needSave = true;
                                }
                            }
                        });
                    }
                    
                    // 检查购买历史，确保已购买的外观道具不会丢失
                    if (parsedData.pointsHistory) {
                        appearanceItems.forEach(itemId => {
                            const itemName = itemId === 'frame_scroll' ? '头像框-书卷' : 
                                           itemId === 'frame_plum' ? '头像框-梅花' : '昵称特效';
                            const hasPurchase = parsedData.pointsHistory.some(h => 
                                h.reason && h.reason.includes(`购买 ${itemName}`) && h.points < 0
                            );
                            if (hasPurchase && !parsedData.ownedAppearance.includes(itemId)) {
                                parsedData.ownedAppearance.push(itemId);
                                needSave = true;
                            }
                        });
                    }
                    
                    // 确保 activeAppearance 对象存在且结构正确
                    if (!parsedData.activeAppearance) {
                        parsedData.activeAppearance = {

                    }

                }

                const timeData = this.getTimeData();
                const now = Date.now();
                
                if (timeData.lastVisit) {
                    const diffMinutes = Math.floor((now - timeData.lastVisit) / 60000);
                    if (diffMinutes > 0 && diffMinutes < 60) {
                        timeData.totalMinutes += diffMinutes;
                    }
                }
                
                timeData.lastVisit = now;
                this.saveTimeData(timeData);
                
                return timeData.totalMinutes;

                let completed = 0;

                books.forEach(book => {
                    const bookProgress = progress[book] || { stage1: false, stage2: false, stage3: false };
                    const stages = (bookProgress.stage1 ? 1 : 0) + (bookProgress.stage2 ? 1 : 0) + (bookProgress.stage3 ? 1 : 0);
                    result[book] = {
                        stages,
                        percent: Math.round((stages / 3) * 100),
                        completed: stages === 3
                    };
                    if (stages === 3) completed++;
                });

                return { books: result, completed };
            },

            getRank() {
                const TOTAL_QUESTIONS = 800;
                const history = this.getHistoryData();
                let mastered = 0;
                
                Object.values(history).forEach(item => {
                    if (item.totalAttempts > 0 && (item.correctCount / item.totalAttempts) >= 0.8) {
                        mastered++;
                    }
                });
                
                const percent = Math.round((mastered / TOTAL_QUESTIONS) * 100);
                
                for (let i = RANKS.length - 1; i >= 0; i--) {
                    const rank = RANKS[i];
                    for (let j = rank.stages.length - 1; j >= 0; j--) {
                        if (percent >= rank.stages[j]) {
                            return {
                                rank: rank,
                                stageIndex: j,
                                stageLabel: ['Ⅰ', 'Ⅱ', 'Ⅲ'][j] || ''
                            };
                        }
                    }
                }
                
                return { rank: RANKS[0], stageIndex: -1, stageLabel: '' };
            }
        };

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过2MB');
                return;
            }

            compressAndSaveAvatar(file);
        }

        function compressAndSaveAvatar(file) {
            const img = new Image();
            const reader = new FileReader();
            
            reader.onload = function(e) {
                img.src = e.target.result;
            };
            
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxSize = 100;
                let width = img.width;
                let height = img.height;
                
                if (width > height) {
                    if (width > maxSize) {
                        height = Math.round(height * maxSize / width);
                        width = maxSize;
                    }
                } else {
                    if (height > maxSize) {
                        width = Math.round(width * maxSize / height);
                        height = maxSize;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                
                const profileData = ProfileManager.getProfileData();
                profileData.avatar = compressedData;
                ProfileManager.saveProfileData(profileData);
                displayAvatar(compressedData);
                applyAppearance();
                
                syncAvatarToServer(compressedData);
            };
            
            reader.readAsDataURL(file);
        }

        async function syncAvatarToServer(avatarData) {
            const userId = sessionStorage.getItem('userId');
            if (!userId) return;
            
            try {
                const appearance = PointsManager.getActiveAppearance();
                await fetch('/sync-avatar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        avatar: avatarData,
                        frame: appearance.frame,
                        frameActive: appearance.frameActive
                    })
                });
            } catch (err) {
                console.error('同步头像失败:', err);
            }
        }

        function displayAvatar(avatarData) {
            const avatar = document.getElementById('avatar');
            const placeholder = document.getElementById('avatarPlaceholder');
            
            if (avatarData) {
                avatar.innerHTML = `<img src="${avatarData}" alt="头像">`;
            } else {
                avatar.innerHTML = `<span id="avatarPlaceholder"><i class="fa-solid fa-user" style="font-size: 2.5rem; color: #6b7280;"></i></span>`;
            }
        }

        function applyAppearance() {
            try {
                const appearance = PointsManager.getActiveAppearance();
                console.log('applyAppearance - 激活的外观:', appearance);
                
                const avatar = document.getElementById('avatar');
                const username = document.getElementById('usernameDisplay');
                
                console.log('avatar元素:', avatar);
                console.log('username元素:', username);
                
                if (appearance.frame && appearance.frameActive) {
                    console.log('添加头像框类:', appearance.frame);
                    avatar.classList.add(appearance.frame);
                }
                
                if (appearance.nicknameEffect && appearance.nicknameActive) {
                    console.log('添加昵称特效类: glow-effect');
                    username.classList.add('glow-effect');
                    username.setAttribute('data-text', username.textContent);
                    console.log('username当前类列表:', username.classList);
                }
            } catch (e) {
                console.error('应用外观失败:', e);
            }
        }

        function renderAppearanceItems() {
            try {
                const pointsData = PointsManager.getData();
                console.log('书卷数据:', pointsData);
                const ownedAppearance = PointsManager.getOwnedAppearance();
                console.log('拥有的外观道具:', ownedAppearance);
                const appearance = PointsManager.getActiveAppearance();
                console.log('激活的外观:', appearance);
                
                const items = [
                    { id: 'frame_scroll', name: '头像框-书卷', icon: '<i class="fa-solid fa-scroll" style="color: #8b4513;"></i>' },
                    { id: 'frame_plum', name: '头像框-梅花', icon: '<i class="fa-solid fa-spa" style="color: #ec4899;"></i>' },
                    { id: 'nickname_glow', name: '昵称特效', icon: '✨' }
                ];
                
                items.forEach(item => {
                    const statusEl = document.getElementById(item.id + '_status');
                    if (!statusEl) {
                        console.log('找不到元素:', item.id + '_status');
                        return;
                    }
                    
                    const isOwned = ownedAppearance.includes(item.id);
                    let isActive = false;
                    
                    if (item.id.startsWith('frame_')) {
                        isActive = appearance.frame === item.id && appearance.frameActive;
                    } else if (item.id === 'nickname_glow') {
                        isActive = appearance.nicknameEffect === item.id && appearance.nicknameActive;
                    }
                    
                    console.log(item.name, '是否拥有:', isOwned, '是否激活:', isActive);
                    
                    if (isActive) {
                        statusEl.className = 'appearance-status active';
                        statusEl.innerHTML = `<button class="appearance-use-btn" style="background:#f44336;" onclick="toggleAppearanceItem('${item.id}', false)">脱下</button>`;
                    } else if (isOwned) {
                        statusEl.className = 'appearance-status owned';
                        statusEl.innerHTML = `<button class="appearance-use-btn" onclick="toggleAppearanceItem('${item.id}', true)">穿上</button>`;
                    } else {
                        statusEl.className = 'appearance-status not-owned';
                        statusEl.innerHTML = '未拥有';
                    }
                });
            } catch (e) {
                console.error('渲染外观道具失败:', e);
            }
        }

        function toggleAppearanceItem(itemId, setActive) {
            try {
                const pointsData = PointsManager.getData();
                const ownedAppearance = PointsManager.getOwnedAppearance();
                
                if (!ownedAppearance.includes(itemId)) {
                    alert('未拥有此外观道具！');
                    return;
                }
                
                if (!pointsData.activeAppearance) {
                    pointsData.activeAppearance = { 
                        frame: null, 
                        frameActive: false,
                        nicknameEffect: null, 
                        nicknameActive: false
                    };
                }
                
                if (itemId === 'frame_scroll' || itemId === 'frame_plum') {
                    // 如果穿上新的头像框，先脱下当前的头像框
                    if (setActive && pointsData.activeAppearance.frameActive) {
                        pointsData.activeAppearance.frameActive = false;
                    }
                    pointsData.activeAppearance.frame = itemId;
                    pointsData.activeAppearance.frameActive = setActive;
                    alert(setActive ? '头像框已穿上！' : '头像框已脱下！');
                } else if (itemId === 'nickname_glow') {
                    pointsData.activeAppearance.nicknameEffect = itemId;
                    pointsData.activeAppearance.nicknameActive = setActive;
                    alert(setActive ? '昵称特效已穿上！' : '昵称特效已脱下！');
                }
                
                localStorage.setItem(PointsManager.STORAGE_KEY, JSON.stringify(pointsData));
                
                location.reload();
            } catch (e) {
                console.error('切换外观道具失败:', e);
            }
        }

        function useAppearanceItem(itemId) {
            toggleAppearanceItem(itemId, true);
        }

        let cloudStats = null;

        async function init() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
                return;
            }

            const profileData = ProfileManager.getProfileData();
            const currentUser = sessionStorage.getItem('currentUser');
            const userId = sessionStorage.getItem('userId');
            
            displayAvatar(profileData.avatar);
            document.getElementById('usernameDisplay').textContent = currentUser || profileData.username;
            
            if (userId) {
                await loadFromCloud(userId);
            }
            
            renderStats();
            renderRank();
            renderBadges();
            renderReadingProgress();
            renderAppearanceItems();
            applyAppearance();
        }

        async function loadFromCloud(userId) {
            try {
                const response = await fetch(`/load-user-stats?userId=${userId}`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        cloudStats = result.data;
                        
                        if (result.data.avatar) {
                            const profileData = ProfileManager.getProfileData();
                            profileData.avatar = result.data.avatar;
                            ProfileManager.saveProfileData(profileData);
                            displayAvatar(result.data.avatar);
                        }
                        
                        if (result.data.frame || result.data.frameActive) {
                            const pointsData = PointsManager.getData();
                            if (!pointsData.activeAppearance) {
                                pointsData.activeAppearance = { 
                                    frame: null, 
                                    frameActive: false,
                                    nicknameEffect: null, 
                                    nicknameActive: false
                                };
                            }
                            if (result.data.frame) {
                                pointsData.activeAppearance.frame = result.data.frame;
                            }
                            if (result.data.frameActive !== undefined) {
                                pointsData.activeAppearance.frameActive = result.data.frameActive;
                            }
                            localStorage.setItem(PointsManager.STORAGE_KEY, JSON.stringify(pointsData));
                        }
                    }
                } else {
                    console.log('从云端加载数据失败（本地模式）');
                }
            } catch (err) {
                console.log('从云端加载数据失败（本地模式）');
            }
        }

        function renderStats() {
            let totalQuestions, correctAnswers, studyMinutes;
            
            if (cloudStats) {
                totalQuestions = cloudStats.total_questions || 0;
                correctAnswers = cloudStats.correct_answers || 0;
                studyMinutes = cloudStats.study_minutes || 0;
            } else {
                const quizStats = ProfileManager.getTotalQuizCount();
                totalQuestions = quizStats.total;
                correctAnswers = quizStats.correct;
                studyMinutes = ProfileManager.updateBrowsingTime();
            }
            
            const accuracy = totalQuestions > 0 
                ? Math.round((correctAnswers / totalQuestions) * 100) 
                : 0;
            
            try {
                const pointsData = localStorage.getItem('user_points_v1');
                if (pointsData) {
                    const points = JSON.parse(pointsData);
                    document.getElementById('totalPoints').textContent = points.totalPoints || 0;
                }
            } catch (e) {
                document.getElementById('totalPoints').textContent = '0';
            }
            
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            const badgeData = ProfileManager.getBadgeData();
            document.getElementById('badgeCount').textContent = badgeData.unlockedBadges.length;
            
            const readingProgress = ProfileManager.getReadingProgress();
            document.getElementById('booksCompleted').textContent = readingProgress.completed + '/4';
            
            if (studyMinutes >= 60) {
                const hours = Math.floor(studyMinutes / 60);
                const mins = studyMinutes % 60;
                document.getElementById('totalTime').textContent = hours + '小时' + (mins > 0 ? mins + '分' : '');
            } else {
                document.getElementById('totalTime').textContent = studyMinutes + '分钟';
            }
        }

        function renderRank() {
            let rankInfo = null;
            
            try {
                const pointsData = localStorage.getItem('user_points_v1');
                if (pointsData) {
                    const points = JSON.parse(pointsData);
                    const totalPoints = points.totalPoints || 0;
                    
                    const RANK_THRESHOLDS = [
                        { name: '状元', minPoints: 50000, icon: 'zhuangyuan', color: '#FFD700' },
                        { name: '翰林', minPoints: 30000, icon: 'hanlin', color: '#00897B' },
                        { name: '进士', minPoints: 15000, icon: 'jinshi', color: '#AB47BC' },
                        { name: '举人', minPoints: 8000, icon: 'juren', color: '#E53935' },
                        { name: '秀才', minPoints: 3000, icon: 'xiucai', color: '#81D4FA' },
                        { name: '书生', minPoints: 1000, icon: 'shusheng', color: '#5C6BC0' },
                        { name: '蒙童', minPoints: 0, icon: 'mengtong', color: '#7CB342' }
                    ];
                    
                    for (const rank of RANK_THRESHOLDS) {
                        if (totalPoints >= rank.minPoints) {
                            rankInfo = {
                                rank: rank,
                                stageIndex: 0,
                                stageLabel: ''
                            };
                            break;
                        }
                    }
                }
            } catch (e) {
                console.error('读取书卷失败:', e);
            }
            
            if (!rankInfo) {
                rankInfo = { rank: RANKS[0], stageIndex: -1, stageLabel: '' };
            }
            
            const rankName = rankInfo.rank.name + (rankInfo.stageLabel ? ' ' + rankInfo.stageLabel : '');
            
            document.getElementById('rankIcon').innerHTML = RANK_ICONS[rankInfo.rank.icon];
            document.getElementById('rankName').textContent = rankName;
            document.getElementById('rankName').style.color = rankInfo.rank.color;
        }

        function renderBadges() {
            const badgeData = ProfileManager.getBadgeData();
            const unlockedIds = badgeData.unlockedBadges || [];
            
            const badgeList = document.getElementById('badgeList');
            
            if (unlockedIds.length === 0) {
                badgeList.innerHTML = '<div class="no-badges">暂无勋章，继续努力吧！</div>';
                return;
            }
            
            const unlockedBadges = BADGES.filter(b => unlockedIds.includes(b.id));
            
            badgeList.innerHTML = unlockedBadges.map(badge => `
                <div class="badge-item ${badge.rarity}">
                    <div class="badge-icon-small">${BADGE_ICONS[badge.id]}</div>
                    <div class="badge-name-small">${badge.name}</div>
                </div>
            `).join('');
        }

        function renderReadingProgress() {
            const readingProgress = ProfileManager.getReadingProgress();
            const books = readingProgress.books;
            
            const bookNames = ['honglou', 'sanguo', 'shuihu', 'xiyou'];
            
            bookNames.forEach(book => {
                const progress = books[book];
                document.getElementById(book + 'Progress').style.width = progress.percent + '%';
                document.getElementById(book + 'Status').textContent = progress.completed ? '已完成' : progress.stages + '/3';
            });
        }

        function syncToCloud() {
            const userId = sessionStorage.getItem('userId');
            if (!userId) return;
            
            const history = ProfileManager.getHistoryData();
            let totalQuestions = 0;
            let correctAnswers = 0;
            let masteredCount = 0;
            
            Object.values(history).forEach(item => {
                totalQuestions += item.totalAttempts || 0;
                correctAnswers += item.correctCount || 0;
                if (item.totalAttempts > 0 && (item.correctCount / item.totalAttempts) >= 0.8) {
                    masteredCount++;
                }
            });
            
            const timeData = ProfileManager.getTimeData();
            
            fetch('/sync-stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId,
                    totalQuestions,
                    correctAnswers,
                    studyMinutes: timeData.totalMinutes || 0,
                    masteredCount
                })
            }).catch(err => console.log('同步失败（本地模式）'));
        }

        init();

        window.addEventListener('storage', function(e) {
            if (e.key === 'quiz_history_v1' || e.key === 'badge_data_v1' || e.key === 'browsing_time_v1') {
                init();
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                init();
            }
        });

        setInterval(() => {
            ProfileManager.updateBrowsingTime();
        }, 60000);

        window.addEventListener('beforeunload', () => {
            ProfileManager.updateBrowsingTime();
            syncToCloud();
        });
    </script>
