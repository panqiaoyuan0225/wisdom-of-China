<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人档案</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            padding: 20px;
            padding-top: 60px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 40px;
            text-decoration: none;
            color: #f0e68c;
            font-weight: bold;
            background: #8b4513;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .page-title {
            text-align: center;
            color: #8b4513;
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .profile-header {
            max-width: 800px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fff9e6, #fff5d6);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border: 3px solid #d4af37;
        }

        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #d4af37;
            object-fit: cover;
            background: #e8e0c0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #8b4513;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-upload-hint {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #8b4513;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #d4af37;
        }

        .avatar-input {
            display: none;
        }

        .user-info {
            flex: 1;
        }

        .username-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .username {
            font-size: 1.8rem;
            font-weight: bold;
            color: #8b4513;
        }

        .user-rank {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .rank-icon-small {
            width: 40px;
            height: 40px;
        }

        .rank-name-text {
            font-size: 1.1rem;
            color: #666;
        }

        .stats-grid {
            max-width: 800px;
            margin: 0 auto 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #8b4513;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .section {
            max-width: 800px;
            margin: 0 auto 30px;
        }

        .section-title {
            color: #8b4513;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #d4af37;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-showcase {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .badge-item {
            width: 80px;
            text-align: center;
            transition: transform 0.3s;
        }

        .badge-item:hover {
            transform: scale(1.1);
        }

        .badge-icon-small {
            width: 60px;
            height: 60px;
            margin: 0 auto 5px;
        }

        .badge-name-small {
            font-size: 0.75rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-badges {
            color: #999;
            text-align: center;
            padding: 20px;
        }

        .reading-progress {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .book-progress-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .book-progress-item:last-child {
            border-bottom: none;
        }

        .book-icon {
            font-size: 2rem;
        }

        .book-info {
            flex: 1;
        }

        .book-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #d4af37, #f0d78c);
            transition: width 0.5s ease;
        }

        .book-status {
            font-size: 0.85rem;
            color: #666;
            min-width: 60px;
            text-align: right;
        }

        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .username {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <a href="home.html" class="back-link">← 返回主页</a>
    
    <h1 class="page-title">个人档案</h1>
    
    <div class="profile-header">
        <div class="avatar-container">
            <div class="avatar" id="avatar" onclick="document.getElementById('avatarInput').click()">
                <span id="avatarPlaceholder">👤</span>
            </div>
            <div class="avatar-upload-hint" onclick="document.getElementById('avatarInput').click()">📷</div>
            <input type="file" id="avatarInput" class="avatar-input" accept="image/*" onchange="handleAvatarUpload(event)">
        </div>
        <div class="user-info">
            <div class="username-container">
                <span class="username" id="usernameDisplay">书友</span>
            </div>
            <div class="user-rank">
                <div class="rank-icon-small" id="rankIcon"></div>
                <span class="rank-name-text" id="rankName">加载中...</span>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📝</div>
            <div class="stat-value" id="totalQuestions">0</div>
            <div class="stat-label">累计答题</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-value" id="accuracy">0%</div>
            <div class="stat-label">正确率</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎖️</div>
            <div class="stat-value" id="badgeCount">0</div>
            <div class="stat-label">获得勋章</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📚</div>
            <div class="stat-value" id="booksCompleted">0/4</div>
            <div class="stat-label">名著阅读</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value" id="totalTime">0分钟</div>
            <div class="stat-label">浏览时长</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">🏅 我的勋章</h2>
        <div class="badge-showcase">
            <div class="badge-list" id="badgeList">
                <div class="no-badges">暂无勋章，继续努力吧！</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">📖 名著阅读进度</h2>
        <div class="reading-progress">
            <div class="book-progress-item">
                <span class="book-icon">📕</span>
                <div class="book-info">
                    <div class="book-name">红楼梦</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="honglouProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="honglouStatus">未开始</span>
            </div>
            <div class="book-progress-item">
                <span class="book-icon">📘</span>
                <div class="book-info">
                    <div class="book-name">三国演义</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="sanguoProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="sanguoStatus">未开始</span>
            </div>
            <div class="book-progress-item">
                <span class="book-icon">📙</span>
                <div class="book-info">
                    <div class="book-name">水浒传</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="shuihuProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="shuihuStatus">未开始</span>
            </div>
            <div class="book-progress-item">
                <span class="book-icon">📗</span>
                <div class="book-info">
                    <div class="book-name">西游记</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="xiyouProgress" style="width: 0%"></div>
                    </div>
                </div>
                <span class="book-status" id="xiyouStatus">未开始</span>
            </div>
        </div>
    </div>

    <g font-family="Noto Serif SC, SimSun, serif" text-anchor="middle">
        <g transform="translate(10, 42)">
            <rect x="0" y="0" width="80" height="12" rx="2" fill="url(#matteRank)" stroke="#b8860b" stroke-width="0.3"/>
            <text x="10" y="8" font-size="6" fill="#8b4513">4</text>

        <g transform="translate(10, 56)">
            <rect x="0" y="0" width="80" height="12" rx="2" fill="url(#matteRank)" stroke="#b8860b" stroke-width="0.3"/>
            <text x="10" y="8" font-size="6" fill="#8b4513">5</text>
            <text x="40" y="8" font-size="6" fill="#333333">追随者</text>
        </g>
        <g transform="translate(10, 70)">
            <rect x="0" y="0" width="80" height="12" rx="2" fill="url(#matteRank)" stroke="#b8860b" stroke-width="0.3"/>
            <text x="10" y="8" font-size="6" fill="#8b4513">6</text>

        </g>
        <g transform="translate(10, 84)">
            <rect x="0" y="0" width="80" height="12" rx="2" fill="url(#matteRank)" stroke="#b8860b" stroke-width="0.3"/>
            <text x="10" y="8" font-size="6" fill="#8b4513">7</text>

        </g>

</svg>`
        };

        const ProfileManager = {
            getProfileData() {
                try {
                    const data = localStorage.getItem(PROFILE_STORAGE_KEY);
                    return data ? JSON.parse(data) : {
                        username: '书友',
                        avatar: null,
                        firstVisit: Date.now()
                    };
                } catch (e) {
                    return { username: '书友', avatar: null, firstVisit: Date.now() };
                }
            },

            saveProfileData(data) {
                try {
                    localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.error('保存用户数据失败:', e);
                }
            },

            getBadgeData() {
                try {
                    const data = localStorage.getItem(BADGE_STORAGE_KEY);
                    return data ? JSON.parse(data) : { unlockedBadges: [], readingProgress: {} };
                } catch (e) {
                    return { unlockedBadges: [], readingProgress: {} };
                }
            },

            getHistoryData() {
                try {
                    const data = localStorage.getItem(HISTORY_KEY);
                    return data ? JSON.parse(data) : {};
                } catch (e) {
                    return {};
                }
            },

            getTimeData() {
                try {
                    const data = localStorage.getItem(TIME_STORAGE_KEY);
                    return data ? JSON.parse(data) : { totalMinutes: 0, lastVisit: null };
                } catch (e) {
                    return { totalMinutes: 0, lastVisit: null };
                }
            },

            saveTimeData(data) {
                try {
                    localStorage.setItem(TIME_STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.error('保存时间数据失败:', e);
                }
            },

            updateBrowsingTime() {
                const timeData = this.getTimeData();
                const now = Date.now();
                
                if (timeData.lastVisit) {
                    const diffMinutes = Math.floor((now - timeData.lastVisit) / 60000);
                    if (diffMinutes > 0 && diffMinutes < 60) {
                        timeData.totalMinutes += diffMinutes;
                    }
                }
                
                timeData.lastVisit = now;
                this.saveTimeData(timeData);
                
                return timeData.totalMinutes;
            },

            getTotalQuizCount() {
                const history = this.getHistoryData();
                let total = 0;
                let correct = 0;
                Object.values(history).forEach(item => {
                    total += item.totalAttempts || 0;
                    correct += item.correctCount || 0;
                });
                return { total, correct };
            },

            getReadingProgress() {
                const badgeData = this.getBadgeData();
                const progress = badgeData.readingProgress || {};
                const books = ['honglou', 'sanguo', 'shuihu', 'xiyou'];
                const result = {};
                let completed = 0;

                books.forEach(book => {
                    const bookProgress = progress[book] || { stage1: false, stage2: false, stage3: false };
                    const stages = (bookProgress.stage1 ? 1 : 0) + (bookProgress.stage2 ? 1 : 0) + (bookProgress.stage3 ? 1 : 0);
                    result[book] = {
                        stages,
                        percent: Math.round((stages / 3) * 100),
                        completed: stages === 3
                    };
                    if (stages === 3) completed++;
                });

                return { books: result, completed };
            },

            getRank() {
                const TOTAL_QUESTIONS = 800;
                const history = this.getHistoryData();
                let mastered = 0;
                
                Object.values(history).forEach(item => {
                    if (item.totalAttempts > 0 && (item.correctCount / item.totalAttempts) >= 0.8) {
                        mastered++;
                    }
                });
                
                const percent = Math.round((mastered / TOTAL_QUESTIONS) * 100);
                
                for (let i = RANKS.length - 1; i >= 0; i--) {
                    const rank = RANKS[i];
                    for (let j = rank.stages.length - 1; j >= 0; j--) {
                        if (percent >= rank.stages[j]) {
                            return {
                                rank: rank,
                                stageIndex: j,
                                stageLabel: ['Ⅰ', 'Ⅱ', 'Ⅲ'][j] || ''
                            };
                        }
                    }
                }
                
                return { rank: RANKS[0], stageIndex: -1, stageLabel: '' };
            }
        };

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过2MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const profileData = ProfileManager.getProfileData();
                profileData.avatar = e.target.result;
                ProfileManager.saveProfileData(profileData);
                displayAvatar(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function displayAvatar(avatarData) {
            const avatar = document.getElementById('avatar');
            const placeholder = document.getElementById('avatarPlaceholder');
            
            if (avatarData) {
                avatar.innerHTML = `<img src="${avatarData}" alt="头像">`;
            } else {
                avatar.innerHTML = `<span id="avatarPlaceholder">👤</span>`;
            }
        }

        let cloudStats = null;

        async function init() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
                return;
            }

            const profileData = ProfileManager.getProfileData();
            const currentUser = sessionStorage.getItem('currentUser');
            const userId = sessionStorage.getItem('userId');
            
            displayAvatar(profileData.avatar);
            document.getElementById('usernameDisplay').textContent = currentUser || profileData.username;
            
            if (userId) {
                await loadFromCloud(userId);
            }
            
            renderStats();
            renderRank();
            renderBadges();
            renderReadingProgress();
        }

        async function loadFromCloud(userId) {
            try {
                const response = await fetch(`/load-user-stats?userId=${userId}`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        cloudStats = result.data;
                    }
                }
            } catch (err) {
                console.error('从云端加载数据失败:', err);
            }
        }

        function renderStats() {
            let totalQuestions, correctAnswers, studyMinutes;
            
            if (cloudStats) {
                totalQuestions = cloudStats.total_questions || 0;
                correctAnswers = cloudStats.correct_answers || 0;
                studyMinutes = cloudStats.study_minutes || 0;
            } else {
                const quizStats = ProfileManager.getTotalQuizCount();
                totalQuestions = quizStats.total;
                correctAnswers = quizStats.correct;
                studyMinutes = ProfileManager.updateBrowsingTime();
            }
            
            const accuracy = totalQuestions > 0 
                ? Math.round((correctAnswers / totalQuestions) * 100) 
                : 0;
            
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            const badgeData = ProfileManager.getBadgeData();
            document.getElementById('badgeCount').textContent = badgeData.unlockedBadges.length;
            
            const readingProgress = ProfileManager.getReadingProgress();
            document.getElementById('booksCompleted').textContent = readingProgress.completed + '/4';
            
            if (studyMinutes >= 60) {
                const hours = Math.floor(studyMinutes / 60);
                const mins = studyMinutes % 60;
                document.getElementById('totalTime').textContent = hours + '小时' + (mins > 0 ? mins + '分' : '');
            } else {
                document.getElementById('totalTime').textContent = studyMinutes + '分钟';
            }
        }

        function renderRank() {
            let masteredCount;
            
            if (cloudStats && cloudStats.mastered_count !== undefined) {
                masteredCount = cloudStats.mastered_count;
            } else {
                const history = ProfileManager.getHistoryData();
                masteredCount = 0;
                Object.values(history).forEach(item => {
                    if (item.totalAttempts > 0 && (item.correctCount / item.totalAttempts) >= 0.8) {
                        masteredCount++;
                    }
                });
            }
            
            const TOTAL_QUESTIONS = 800;
            const percent = Math.round((masteredCount / TOTAL_QUESTIONS) * 100);
            
            let rankInfo = null;
            for (let i = RANKS.length - 1; i >= 0; i--) {
                const rank = RANKS[i];
                for (let j = rank.stages.length - 1; j >= 0; j--) {
                    if (percent >= rank.stages[j]) {
                        rankInfo = {
                            rank: rank,
                            stageIndex: j,
                            stageLabel: ['Ⅰ', 'Ⅱ', 'Ⅲ'][j] || ''
                        };
                        break;
                    }
                }
                if (rankInfo) break;
            }
            
            if (!rankInfo) {
                rankInfo = { rank: RANKS[0], stageIndex: -1, stageLabel: '' };
            }
            
            const rankName = rankInfo.rank.name + (rankInfo.stageLabel ? ' ' + rankInfo.stageLabel : '');
            
            document.getElementById('rankIcon').innerHTML = RANK_ICONS[rankInfo.rank.icon];
            document.getElementById('rankName').textContent = rankName;
            document.getElementById('rankName').style.color = rankInfo.rank.color;
        }

        function renderBadges() {
            const badgeData = ProfileManager.getBadgeData();
            const unlockedIds = badgeData.unlockedBadges || [];
            
            const badgeList = document.getElementById('badgeList');
            
            if (unlockedIds.length === 0) {
                badgeList.innerHTML = '<div class="no-badges">暂无勋章，继续努力吧！</div>';
                return;
            }
            
            const unlockedBadges = BADGES.filter(b => unlockedIds.includes(b.id));
            
            badgeList.innerHTML = unlockedBadges.map(badge => `
                <div class="badge-item">
                    <div class="badge-icon-small">${BADGE_ICONS[badge.id]}</div>
                    <div class="badge-name-small">${badge.name}</div>
                </div>
            `).join('');
        }

        function renderReadingProgress() {
            const readingProgress = ProfileManager.getReadingProgress();
            const books = readingProgress.books;
            
            const bookNames = ['honglou', 'sanguo', 'shuihu', 'xiyou'];
            
            bookNames.forEach(book => {
                const progress = books[book];
                document.getElementById(book + 'Progress').style.width = progress.percent + '%';
                document.getElementById(book + 'Status').textContent = progress.completed ? '已完成' : progress.stages + '/3';
            });
        }

        function syncToCloud() {
            const userId = sessionStorage.getItem('userId');
            if (!userId) return;
            
            const history = ProfileManager.getHistoryData();
            let totalQuestions = 0;
            let correctAnswers = 0;
            let masteredCount = 0;
            
            Object.values(history).forEach(item => {
                totalQuestions += item.totalAttempts || 0;
                correctAnswers += item.correctCount || 0;
                if (item.totalAttempts > 0 && (item.correctCount / item.totalAttempts) >= 0.8) {
                    masteredCount++;
                }
            });
            
            const timeData = ProfileManager.getTimeData();
            
            fetch('/sync-stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId,
                    totalQuestions,
                    correctAnswers,
                    studyMinutes: timeData.totalMinutes || 0,
                    masteredCount
                })
            }).catch(err => console.error('同步失败:', err));
        }

        init();

        window.addEventListener('storage', function(e) {
            if (e.key === 'quiz_history_v1' || e.key === 'badge_data_v1' || e.key === 'browsing_time_v1') {
                init();
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                init();
            }
        });

        setInterval(() => {
            ProfileManager.updateBrowsingTime();
        }, 60000);

        window.addEventListener('beforeunload', () => {
            ProfileManager.updateBrowsingTime();
            syncToCloud();
        });
    </script>
