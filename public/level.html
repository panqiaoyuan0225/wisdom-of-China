<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>段位</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            padding: 20px;
            padding-top: 60px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 40px;
            text-decoration: none;
            color: #f5f5dc;
            font-weight: bold;
            background: #8b4513;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 100;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .page-title {
            text-align: center;
            color: #8b4513;
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .current-rank-card {
            max-width: 400px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fff9e6, #fff5d6);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border: 3px solid #d4af37;
        }

        .rank-icon-large {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .rank-name-large {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .rank-progress-text {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
        }

        .ranks-section {
            max-width: 800px;
            margin: 0 auto;
        }

        .section-title {
            color: #8b4513;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .ranks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .rank-item {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .rank-item.locked {
            opacity: 0.5;
            filter: grayscale(0.8);
        }

        .rank-item.current {
            border: 3px solid #d4af37;
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.3);
        }

        .rank-item.unlocked {
            border: 2px solid #8b4513;
        }

        .rank-icon-small {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
        }

        .rank-name-small {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .rank-requirement {
            font-size: 0.85rem;
            color: #888;
        }

        .rank-stages {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .stage-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            background: #e0e0e0;
            color: #999;
        }

        .stage-dot.unlocked {
            background: #d4af37;
            color: #fff;
        }

        .stage-dot.current {
            background: #8b4513;
            color: #fff;
            box-shadow: 0 0 10px rgba(139, 69, 19, 0.5);
        }

        .lock-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            .page-title {
                font-size: 1.8rem;
            }
            
            .current-rank-card {
                padding: 20px;
            }
            
            .rank-icon-large {
                width: 80px;
                height: 80px;
            }
            
            .rank-name-large {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        const TOTAL_QUESTIONS = 800;
        const STORAGE_KEY = 'quiz_history_v1';

        function getHistoryData() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : {};
            } catch (e) {
                return {};
            }
        }

        function calculateMastery() {
            const history = getHistoryData();
            let mastered = 0;
            
            Object.values(history).forEach(item => {
                if (item.totalAttempts > 0 && (item.correctCount / item.totalAttempts) >= 0.8) {
                    mastered++;
                }
            });
            
            return mastered;
        }

        function getRankByMastery(masteryPercent) {
            for (let i = RANKS.length - 1; i >= 0; i--) {
                const rank = RANKS[i];
                for (let j = rank.stages.length - 1; j >= 0; j--) {
                    if (masteryPercent >= rank.stages[j]) {
                        return {
                            rank: rank,
                            stageIndex: j,
                            stage: j + 1,
                            stageLabel: ['Ⅰ', 'Ⅱ', 'Ⅲ'][j] || ''
                        };
                    }
                }
            }
            return {
                rank: RANKS[0],
                stageIndex: -1,
                stage: 0,
                stageLabel: ''
            };
        }

        function getNextTarget(currentPercent) {
            for (const rank of RANKS) {
                for (let i = 0; i < rank.stages.length; i++) {
                    if (currentPercent < rank.stages[i]) {
                        return {
                            target: rank.stages[i],
                            rank: rank,
                            stage: i + 1
                        };
                    }
                }
            }
            return null;
        }

        function renderCurrentRank() {
            const mastered = calculateMastery();
            const percent = Math.round((mastered / TOTAL_QUESTIONS) * 100);
            const currentRank = getRankByMastery(percent);
            const nextTarget = getNextTarget(percent);
            
            const rankName = currentRank.rank.name + (currentRank.stageLabel ? ' ' + currentRank.stageLabel : '');
            document.getElementById('currentRankName').textContent = rankName;
            document.getElementById('currentRankName').style.color = currentRank.rank.color;
            
            document.getElementById('currentRankIcon').innerHTML = RANK_ICONS[currentRank.rank.icon];
            
            const progressText = nextTarget 
                ? `距离 ${nextTarget.rank.name} ${['Ⅰ', 'Ⅱ', 'Ⅲ'][nextTarget.stage - 1]} 还需掌握 ${Math.ceil((nextTarget.target / 100) * TOTAL_QUESTIONS) - mastered} 题`
                : '已达到最高段位！';
            document.getElementById('rankProgressText').textContent = progressText;
            
            let progressPercent;
            if (nextTarget) {
                const prevTarget = currentRank.stageIndex >= 0 
                    ? currentRank.rank.stages[currentRank.stageIndex] 
                    : 0;
                const range = nextTarget.target - prevTarget;
                const current = percent - prevTarget;
                progressPercent = Math.round((current / range) * 100);
            } else {
                progressPercent = 100;
            }
            
            const progressBar = document.getElementById('progressBarFill');
            progressBar.style.width = progressPercent + '%';
            progressBar.style.background = currentRank.rank.color;
            
            document.getElementById('progressCurrent').textContent = `已掌握 ${mastered} 题`;
            document.getElementById('progressTotal').textContent = `共 ${TOTAL_QUESTIONS} 题 (${percent}%)`;
            
            const card = document.getElementById('currentRankCard');
            card.style.borderColor = currentRank.rank.color;
        }

        function renderRanksGrid() {
            const mastered = calculateMastery();
            const percent = Math.round((mastered / TOTAL_QUESTIONS) * 100);
            const currentRank = getRankByMastery(percent);
            
            const grid = document.getElementById('ranksGrid');
            grid.innerHTML = '';
            
            RANKS.forEach((rank, rankIndex) => {
                const isUnlocked = percent >= rank.stages[0];
                const isCurrent = currentRank.rank === rank;
                
                const item = document.createElement('div');
                item.className = 'rank-item';
                if (isCurrent) item.classList.add('current');
                else if (isUnlocked) item.classList.add('unlocked');
                else item.classList.add('locked');
                
                let stagesHtml = '';
                if (rank.stages.length > 1) {
                    stagesHtml = '<div class="rank-stages">';
                    rank.stages.forEach((stage, i) => {
                        const stagePercent = stage;
                        let dotClass = 'stage-dot';
                        if (percent >= stagePercent) {
                            if (currentRank.rank === rank && currentRank.stageIndex === i) {
                                dotClass += ' current';
                            } else {
                                dotClass += ' unlocked';
                            }
                        }
                        stagesHtml += `<div class="${dotClass}">${['Ⅰ', 'Ⅱ', 'Ⅲ'][i]}</div>`;
                    });
                    stagesHtml += '</div>';
                }
                
                const lockIcon = !isUnlocked ? '<span class="lock-overlay">🔒</span>' : '';
                
                item.innerHTML = `
                    ${lockIcon}
                    <div class="rank-icon-small">${RANK_ICONS[rank.icon]}</div>
                    <div class="rank-name-small" style="color: ${rank.color}">${rank.name}</div>
                    <div class="rank-requirement">掌握 ${rank.stages[rank.stages.length - 1]}%</div>
                    ${stagesHtml}
                `;
                
                grid.appendChild(item);
            });
        }

        renderCurrentRank();
        renderRanksGrid();
    </script>
</body>
</html>
